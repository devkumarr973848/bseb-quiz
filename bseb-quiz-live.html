function checkAchievements(){
  const G = S.gamification || {};
  const unlocked = G.achievements || {};
  const newBadges = [];
  const correct = S.score.correct;
  const total = correct + S.score.wrong;
  const acc = total >= 20 ? Math.round(correct/total*100) : 0;
  const streak = G.streak || 0;
  const subjectsDone = Object.keys(G.subjectAttempts || {});

  const checks = [
    ['first_q',  total >= 1],
    ['streak3',  streak >= 3],
    ['streak7',  streak >= 7],
    ['streak30', streak >= 30],
    ['c10',      correct >= 10],
    ['c50',      correct >= 50],
    ['c100',     correct >= 100],
    ['c500',     correct >= 500],
    ['acc80',    acc >= 80],
    ['acc95',    acc >= 95],
    ['speed10',  (G.speedCorrect||0) >= 10],
    ['mock1',    (G.mocksTaken||0) >= 1],
    ['mock_pass',(G.bestMockPct||0) >= 60],
    ['all_subj', subjectsDone.length >= 6],
    ['phy_master',(G.subjectCorrect||{})['phy'] >= 50],
    ['mat_master',(G.subjectCorrect||{})['mat'] >= 50],
  ];

  for(const [id, cond] of checks){
    if(cond && !unlocked[id]){
      unlocked[id] = Date.now();
      newBadges.push(id);
    }
  }
  if(!S.gamification) S.gamification = {};
  S.gamification.achievements = unlocked;
  if(newBadges.length > 0){
    saveGamification();
    newBadges.forEach(id => showBadgePopup(id));
  }
}

  el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a1508,#2a2010);border:2px solid #e3a83f;border-radius:16px;padding:16px 22px;z-index:9999;text-align:center;animation:badgePop .4s ease;min-width:220px;box-shadow:0 0 30px rgba(227,168,63,.4)';

// ── Streak System ─────────────────────────────────────────────────
function updateStreak(){
  const G = S.gamification || {};
  const today = new Date().toDateString();
  const lastDate = G.lastLoginDate;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if(lastDate === today) return; // already counted today
  if(lastDate === yesterday){
    G.streak = (G.streak||0) + 1;
    G.maxStreak = Math.max(G.maxStreak||0, G.streak);
  } else if(lastDate !== today){
    G.streak = 1; // reset
  }
  G.lastLoginDate = today;
  S.gamification = G;
  saveGamification();
}

// ── XP Award ─────────────────────────────────────────────────────
function awardXP(amount, label){
  const G = S.gamification || {};
  const streak = G.streak || 1;
  const multiplier = streak >= 7 ? 2 : streak >= 3 ? 1.5 : 1;
  const final = Math.round(amount * multiplier);
  G.xp = (G.xp||0) + final;
  S.gamification = G;
  showXPPop(final, label, multiplier > 1);
  saveGamification();
  setTimeout(fbSyncGamification, 500);
}

function showXPPop(amount, label, streakBonus){
  const el = document.createElement('div');
  el.className = 'xp-pop';
  el.textContent = `+${amount} XP${streakBonus?' 🔥':''}`;
  el.style.cssText = 'position:fixed;bottom:90px;right:16px;background:#e3a83f;color:#000;font-weight:800;font-size:13px;padding:6px 12px;border-radius:20px;z-index:9998;animation:xpFloat 1.5s ease forwards;pointer-events:none';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1500);
}

    <div style="text-align:center;margin-top:16px">
      <div style="color:var(--text-faint);font-size:12px">Speed Score इस session में: <b style="color:var(--lamp)" id="speed-score-display">${(S.gamification||{}).speedSession||0} सही</b></div>
    </div>
  </div>`);
  window.scrollTo(0,0);

  // Start countdown
  speedTimer = setInterval(()=>{
    speedTimeLeft--;
    const el = document.getElementById('speed-timer');
    if(el){
      el.textContent = speedTimeLeft;
      el.style.color = speedTimeLeft <= 10 ? '#ff2222' : speedTimeLeft <= 20 ? '#ff8800' : '#ff4444';
    }
    if(speedTimeLeft <= 0){
      clearInterval(speedTimer);
      if(!S.speedAnswered) handleSpeedTimeout();
    }
  }, 1000);
}

function handleSpeedAnswer(chosen){
  if(S.speedAnswered) return;
  S.speedAnswered = true;
  clearInterval(speedTimer);
  const qs = getQs(S.speedSubj, "obj");
  const item = qs[S.speedIdx];
  const correct = item.ans;
  const letters = ["A","B","C","D"];
  const opts = document.querySelectorAll("#omr-list .omr-opt");
  opts.forEach((el,i)=>{
    el.classList.add("disabled");
    if(i===correct) el.classList.add("correct");
    if(i===chosen && i!==correct) el.classList.add("wrong");
  });
  const fb = document.getElementById("feedback-slot");
  const G = S.gamification || {};
  if(chosen===correct){
    S.score.correct++;
    G.speedCorrect = (G.speedCorrect||0)+1;
    G.speedSession = (G.speedSession||0)+1;
    S.gamification = G;
    if(fb) fb.innerHTML = `<div class="feedback good" style="font-size:16px">✅ सही! +${speedTimeLeft>20?15:speedTimeLeft>10?10:5} XP ⚡</div>`;
    awardXP(speedTimeLeft>20?15:speedTimeLeft>10?10:5, "Speed");
    celebrateCorrect();
    saveProgress(); fbSyncScore();
    checkAchievements();
    const ss = document.getElementById('speed-score-display');
    if(ss) ss.textContent = G.speedSession+" सही";
    setTimeout(()=>renderSpeedMode(), 1500);
  } else {
    S.score.wrong++;
    G.speedSession = 0; // reset session streak on wrong
    S.gamification = G;
    if(fb) fb.innerHTML = `<div class="feedback bad">❌ गलत! सही: ${letters[correct]}) ${esc(item.opts[correct])}</div>`;
    saveProgress(); fbSyncScore();
    const ac = document.getElementById("action-slot");
    if(ac) ac.innerHTML = `<button class="btn btn-primary" data-act="speed-next" style="width:100%">अगला सवाल →</button>`;
  }
}

function handleSpeedTimeout(){
  S.speedAnswered = true;
  const G = S.gamification || {};
  G.speedSession = 0;
  S.gamification = G;
  const fb = document.getElementById("feedback-slot");
  if(fb) fb.innerHTML = `<div class="feedback bad">⏰ Time Out! अगली बार जल्दी करो</div>`;
  S.score.wrong++;
  saveProgress();
  const ac = document.getElementById("action-slot");
  if(ac) ac.innerHTML = `<button class="btn btn-primary" data-act="speed-next" style="width:100%">अगला सवाल →</button>`;
}

// ── Mock Exam Mode ────────────────────────────────────────────────
var mockTimer = null;

function renderMockExam(){
  S.view = "mock-select";
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));

  const subjCards = Object.entries(SUBJECTS).map(([k,v])=>`
    <button class="btn" data-act="start-mock" data-s="${k}" style="text-align:left;padding:14px 18px">
      ${v.icon} <b>${v.name}</b>
      <span style="float:right;color:var(--text-faint);font-size:12px">3 घंटे · 100 Qs</span>
    </button>`).join('');
  render(`<div style="padding:4px 0 80px">
    <div class="admit-title">📝 Mock Exam</div>
    <div style="color:var(--text-faint);font-size:12px;text-align:center;margin:6px 0 16px">BSEB Pattern · 3 घंटे की टाइमर · Real Exam Feel</div>
    ${subjCards}
    <button class="btn btn-ghost" data-act="start-mock-full" style="margin-top:8px;width:100%">🎯 All Subjects (Random Mix)</button>

}

function startMock(subj){
  if(mockTimer) clearInterval(mockTimer);
  const qs = subj === 'all'
    ? Object.keys(SUBJECTS).flatMap(k=>getQs(k,"obj")).sort(()=>Math.random()-.5).slice(0,100)
    : getQs(subj,"obj").slice(0,100);
  S.mockQs = qs;
  S.mockSubj = subj;
  S.mockAnswers = {};
  S.mockIdx = 0;
  S.mockStartTime = Date.now();
  S.mockTimeLeft = 3 * 60 * 60; // 3 hours in seconds
  S.view = "mock-exam";
  renderMockQuestion();

  mockTimer = setInterval(()=>{
    S.mockTimeLeft--;
    const el = document.getElementById('mock-timer');
    if(el){
      const h = Math.floor(S.mockTimeLeft/3600);
      const m = Math.floor((S.mockTimeLeft%3600)/60);
      const s = S.mockTimeLeft%60;
      el.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.style.color = S.mockTimeLeft < 600 ? '#ff4444' : 'var(--lamp)';
    }
    if(S.mockTimeLeft <= 0) submitMock();
  }, 1000);
}

function renderMockQuestion(){
  const total = S.mockQs.length;
  const idx = S.mockIdx;
  const item = S.mockQs[idx];
  const answered = Object.keys(S.mockAnswers).length;
  const letters = ["A","B","C","D"];
  const myAns = S.mockAnswers[idx];
  const h = Math.floor(S.mockTimeLeft/3600);
  const m = Math.floor((S.mockTimeLeft%3600)/60);
  const s = S.mockTimeLeft%60;
  const timeStr = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  const opts = item.opts.map((o,i)=>`
    <div class="omr-opt${myAns===i?' selected disabled':''}" data-act="mock-answer" data-i="${i}">
      <span class="bubble">${letters[i]}</span>
      <span class="opt-text">${esc(o)}</span>
    </div>`).join('');

  const pct = Math.round((idx+1)/total*100);
  render(`<div style="padding:4px 0 80px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:12px;color:var(--text-faint)">📝 Mock Exam · Q${idx+1}/${total}</div>
      <div id="mock-timer" style="font-family:'JetBrains Mono',monospace;font-weight:800;font-size:16px;color:var(--lamp)">${timeStr}</div>
    </div>
    <div style="height:4px;background:rgba(255,255,255,.08);border-radius:4px;margin-bottom:12px">
      <div style="width:${pct}%;height:100%;background:var(--lamp);border-radius:4px;transition:width .3s"></div>
    </div>
    <div style="background:rgba(227,168,63,.07);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--text-faint);display:flex;justify-content:space-between">
      <span>✅ Answered: ${answered}</span>
      <span>⬜ Remaining: ${total-answered}</span>
    </div>
    <div class="qcard">
      <div class="qtext">${esc(item.q)}</div>
      <div class="omr-list" id="omr-list">${opts}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn" data-act="mock-prev" ${idx===0?'disabled':''} style="flex:1">← पिछला</button>
      <button class="btn" data-act="mock-next" ${idx>=total-1?'disabled':''} style="flex:1">अगला →</button>
    </div>
    <button class="btn btn-primary" data-act="submit-mock" style="width:100%;margin-top:8px;background:${answered===total?'':'rgba(227,168,63,.3)'}">
      📤 Submit Exam (${answered}/${total} done)
    </button>
  </div>`);
  window.scrollTo(0,0);
}

function mockAnswer(chosen){
  if(S.mockAnswers[S.mockIdx] !== undefined) return;
  S.mockAnswers[S.mockIdx] = chosen;
  // Mark option and go next
  renderMockQuestion();
  if(S.mockIdx < S.mockQs.length-1){
    setTimeout(()=>{ S.mockIdx++; renderMockQuestion(); }, 400);
  }
}

function submitMock(){
  if(mockTimer){ clearInterval(mockTimer); mockTimer=null; }
  const qs = S.mockQs;
  let correct=0, wrong=0, unattempted=0;
  const subjectStats = {};
  qs.forEach((item,i)=>{
    const ans = S.mockAnswers[i];
    if(ans===undefined){ unattempted++; return; }
    const subj = item._subj || 'unknown';
    if(!subjectStats[subj]) subjectStats[subj]={c:0,w:0};
    if(ans===item.ans){ correct++; if(subjectStats[subj]) subjectStats[subj].c++; }
    else{ wrong++; if(subjectStats[subj]) subjectStats[subj].w++; }
  });
  const total = correct+wrong;
  const pct = Math.round(correct/qs.length*100);
  const grade = pct>=80?'A+':pct>=70?'A':pct>=60?'B+':pct>=50?'B':pct>=40?'C':'D';
  const timeTaken = 3*3600 - S.mockTimeLeft;
  const tm = Math.floor(timeTaken/60), ts = timeTaken%60;

  // Update gamification
  const G = S.gamification||{};
  G.mocksTaken = (G.mocksTaken||0)+1;
  G.bestMockPct = Math.max(G.bestMockPct||0, pct);
  S.gamification = G;
  saveGamification();
  awardXP(correct*5, "Mock Exam");
  checkAchievements();

  S.view="mock-result";
  render(`<div style="padding:4px 0 80px">
    <div style="text-align:center;padding:20px 0 16px">
      <div style="font-size:64px">${pct>=60?'🎉':'😤'}</div>
      <div style="font-size:42px;font-weight:900;color:${pct>=60?'#4caf50':pct>=40?'var(--lamp)':'#ff4444'}">${pct}%</div>
      <div style="font-size:28px;font-weight:800;color:var(--lamp);margin-top:4px">Grade: ${grade}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div class="lb-stat"><div class="sv">${correct}</div><div class="sl">✅ सही</div></div>
      <div class="lb-stat"><div class="sv">${wrong}</div><div class="sl">❌ गलत</div></div>
      <div class="lb-stat"><div class="sv">${unattempted}</div><div class="sl">⬜ छोड़ा</div></div>
    </div>
    <div style="background:var(--panel);border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;color:var(--text-faint);margin-bottom:8px">📊 Performance</div>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px"><span>कुल सवाल</span><b>${qs.length}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px"><span>Accuracy</span><b style="color:${pct>=60?'#4caf50':'#ff4444'}">${total>0?Math.round(correct/total*100):0}%</b></div>
      <div style="display:flex;justify-content:space-between;font-size:14px"><span>समय लगा</span><b>${tm} मिनट ${ts} सेकंड</b></div>
    </div>
    <div style="background:${pct>=60?'rgba(76,175,80,.1)':'rgba(255,68,68,.1)'};border:1px solid ${pct>=60?'#4caf50':'#ff4444'};border-radius:12px;padding:14px;text-align:center;font-size:14px;color:var(--text);margin-bottom:12px">
      ${pct>=60?'🎊 बहुत बढ़िया! BSEB pass करने की राह पर हो। ऐसे ही practice जारी रखो!':'💪 हार मत मानो! हर गलती से सीखो। कमज़ोर topics को /weak से देखो और दोबारा practice करो।'}
    </div>
    <button class="btn btn-primary" data-act="go-home" style="width:100%">🏠 Home</button>
    <button class="btn" data-act="open-mock" style="width:100%;margin-top:8px">📝 दूसरा Mock Test</button>
  </div>`);
  window.scrollTo(0,0);
}

// ── Profile / Stats View ──────────────────────────────────────────
function renderProfile(){
  S.view="profile";
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-profile").classList.add("active");
  const G = S.gamification||{};
  const xp = G.xp||0;
  const lv = getLevel(xp);
  const nx = getNextLevel(xp);
  const streak = G.streak||0;
  const maxStreak = G.maxStreak||0;
  const total = S.score.correct+S.score.wrong;
  const acc = total>0?Math.round(S.score.correct/total*100):0;
  const xpToNext = nx ? nx.min-xp : 0;
  const xpPct = nx ? Math.round((xp-lv.min)/(nx.min-lv.min)*100) : 100;

  // Achievements
  const unlocked = G.achievements||{};
  const badgeHtml = ACHIEVEMENTS.map(a=>`
    <div style="text-align:center;padding:10px 6px;background:${unlocked[a.id]?'rgba(227,168,63,.1)':'rgba(255,255,255,.03)'};border:1px solid ${unlocked[a.id]?'rgba(227,168,63,.4)':'rgba(255,255,255,.06)'};border-radius:12px;opacity:${unlocked[a.id]?1:.4}">
      <div style="font-size:28px">${a.icon}</div>
      <div style="font-size:10px;font-weight:700;color:${unlocked[a.id]?'var(--lamp)':'var(--text-faint)'};margin-top:4px;line-height:1.3">${a.name}</div>
    </div>`).join('');

  render(`<div style="padding:4px 0 90px">
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:52px">👤</div>
      <div style="font-size:18px;font-weight:800;color:var(--text);margin-top:6px">${esc(S.displayName||S.rollNo)}</div>
      <div style="font-size:13px;color:var(--lamp);font-weight:700;margin-top:3px">${lv.name}</div>
    </div>

    <div style="background:var(--panel);border-radius:14px;padding:16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text-faint)">XP: <b style="color:var(--lamp)">${xp.toLocaleString()}</b></span>
        <span style="font-size:12px;color:var(--text-faint)">${nx?`अगला level में ${xpToNext} XP बाकी`:'MAX LEVEL! 🏆'}</span>
      </div>
      <div style="height:8px;background:rgba(255,255,255,.08);border-radius:8px">
        <div style="width:${xpPct}%;height:100%;background:linear-gradient(90deg,var(--lamp-dim),var(--lamp));border-radius:8px;transition:width .5s"></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="lb-stat"><div class="sv">${streak}🔥</div><div class="sl">Current Streak</div></div>
      <div class="lb-stat"><div class="sv">${maxStreak}</div><div class="sl">Best Streak</div></div>
      <div class="lb-stat"><div class="sv">${acc}%</div><div class="sl">Accuracy</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div class="lb-stat"><div class="sv">${S.score.correct}</div><div class="sl">✅ सही</div></div>
      <div class="lb-stat"><div class="sv">${S.score.wrong}</div><div class="sl">❌ गलत</div></div>
      <div class="lb-stat"><div class="sv">${G.mocksTaken||0}</div><div class="sl">📝 Mocks</div></div>
    </div>

    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">🏆 Achievements (${Object.keys(unlocked).length}/${ACHIEVEMENTS.length})</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">${badgeHtml}</div>

    <button class="btn btn-primary" data-act="open-speed" style="width:100%;margin-bottom:8px">⚡ Speed Mode खेलो</button>
    <button class="btn" data-act="open-mock" style="width:100%;margin-bottom:8px">📝 Mock Exam दो</button>
    <button class="btn" data-act="start-battle" style="width:100%;margin-bottom:8px">⚔️ Battle Mode (2 Players)</button>
    <button class="btn" data-act="show-analytics" style="width:100%;margin-bottom:8px">📊 Smart Analytics</button>
    <button class="btn" data-act="open-admin" style="width:100%;background:rgba(255,80,0,.15);border-color:rgba(255,80,0,.4)">🛠️ Admin Dashboard (Password Required)</button>
  </div>`);
  window.scrollTo(0,0);
}

// ── Patch handleAnswer to award XP & track subjects ───────────────
const _origHandleAnswer = handleAnswer;
function handleAnswer(chosenIdx){
  const subj = S.subject;
  const G = S.gamification || {};
  if(!G.subjectAttempts) G.subjectAttempts = {};
  if(!G.subjectCorrect) G.subjectCorrect = {};
  G.subjectAttempts[subj] = (G.subjectAttempts[subj]||0)+1;
  S.gamification = G;

  const qs = getQs(S.subject, S.mode);
  const item = qs[S.idx];
  const isCorrect = chosenIdx === item.ans;
  if(isCorrect){
    G.subjectCorrect[subj] = (G.subjectCorrect[subj]||0)+1;
    S.gamification = G;
    awardXP(10, "Correct");
  }
  saveGamification();
  _origHandleAnswer(chosenIdx);
  setTimeout(checkAchievements, 200);
}

<script>
// ================================================================

// 🛡️ Anti-Cheat
(function(){
  var exam=false;
  window.enableExamMode=function(){exam=true;document.body.style.userSelect='none';};
  window.disableExamMode=function(){exam=false;document.body.style.userSelect='';};
  document.addEventListener('contextmenu',function(e){if(exam||document.querySelector('.qcard')){e.preventDefault();}});
  document.addEventListener('keydown',function(e){
    if(!exam&&!document.querySelector('.qcard'))return;
    var k=e.key.toLowerCase();
    if(e.ctrlKey&&'cvuspa'.includes(k)){e.preventDefault();showToast('🚫 Disabled!','warning');}
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(k==='i'||k==='j'))){e.preventDefault();}
  });
  ['copy','cut','paste','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,function(e){if(exam||document.querySelector('.qcard')){e.preventDefault();}});
  });
  var tabs=0;
  document.addEventListener('visibilitychange',function(){
    if(exam&&document.hidden){tabs++;showToast('⚠️ Tab switch #'+tabs+'!','danger');
      if(window._fbReady&&window.S)try{window._fbRef('exam_logs/'+window.S.rollNo).push({type:'TAB',count:tabs,ts:Date.now()});}catch(e){}
      if(tabs>=3&&window.autoSubmitTest)window.autoSubmitTest('Auto-submitted');
    }
  });
})();

// 📝 Live Test Module
(function(){
  window.testConfig={isActive:false,questions:[],answers:{},submitted:false};
  var testTimer=null,timeLeft=0;
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

  window.startLiveTest=function(td){
    var qs=td.questions||[];
    if(window.enableExamMode)window.enableExamMode();
    window.testConfig={isActive:true,startTime:Date.now(),questions:qs,answers:{},submitted:false,testName:td.testName,subject:td.subject,currentIndex:0};
    timeLeft=td.duration*60;
    if(testTimer)clearInterval(testTimer);
    var app=document.getElementById('app');
    if(app){
      app.innerHTML='<div class="admit" style="border-color:var(--bad)"><div class="admit-row"><div><div class="admit-title">📝 '+esc(td.testName||'Test')+'</div><div class="admit-meta"><div><span class="lbl">⏱</span><span class="val" id="tt-tmr">'+fmt(timeLeft)+'</span></div><div><span class="lbl">Done</span><span class="val" id="tt-prg">0/'+qs.length+'</span></div></div></div><button class="btn" style="width:auto;padding:8px 14px;background:var(--bad);border:none;border-radius:8px" onclick="window.submitTest()">📤 Submit</button></div></div><div id="tqc"></div>';
      window.renderTestQuestion(0);
    }
    var fl=document.createElement('div');fl.id='fl-tmr';
    fl.style.cssText='position:fixed;bottom:80px;right:16px;background:var(--bad);color:#fff;padding:8px 14px;border-radius:12px;font-family:JetBrains Mono,monospace;font-size:16px;font-weight:700;z-index:9999';
    fl.innerHTML='⏱️ <span id="fl-txt">'+fmt(timeLeft)+'</span>';
    document.body.appendChild(fl);
    testTimer=setInterval(function(){
      if(!window.testConfig.isActive||window.testConfig.submitted)return;
      timeLeft--;
      var a=document.getElementById('tt-tmr'),b=document.getElementById('fl-txt');
      if(a)a.textContent=fmt(timeLeft);if(b)b.textContent=fmt(timeLeft);
      if(timeLeft===300)showToast('⚠️ 5 min baki!','warning');
      if(timeLeft===60)showToast('⏰ 1 min baki!','danger');
      if(timeLeft<=0&&window.submitTest)window.submitTest('Time up!');
    },1000);
    window.scrollTo(0,0);
    showToast('📝 "'+td.testName+'" started! '+td.duration+' min.','success');
  };

  window.renderTestQuestion=function(idx){
    var c=document.getElementById('tqc');if(!c)return;
    var qs=window.testConfig.questions;
    if(!qs||idx<0||idx>=qs.length){
      if(idx>=qs.length)c.innerHTML='<div class="result-wrap"><button class="btn btn-primary" onclick="window.submitTest()">📤 Submit Test</button></div>';
      return;
    }
    var q=qs[idx],total=qs.length,myAns=window.testConfig.answers[idx];
    var pct=((idx+1)/total*100).toFixed(1);
    var answered=Object.keys(window.testConfig.answers).length;
    var p=document.getElementById('tt-prg');if(p)p.textContent=answered+'/'+total;
    var letters=['A','B','C','D'];
    var optsH=q.opts.map(function(o,i){
      var sel=(myAns===i)?' selected disabled':'';
      return '<div class="omr-opt'+sel+'" onclick="window.answerTestQ('+idx+','+i+')"><span class="bubble">'+letters[i]+'</span><span class="opt-text">'+esc(o)+'</span></div>';

    var u=new SpeechSynthesisUtterance(text.slice(0,300));

    var v=window.speechSynthesis.getVoices().find(function(v){return v.lang.includes('hi');});
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
    showToast('Bol raha hoon...','info');
  };

  }

  window.setAIMode=function(mode){window.aiState.currentMode=mode;window.renderAIChat();};
  window.renderChat=window.renderAIChat;

  // Update nav-chat icon
  var nb=document.getElementById('nav-chat');
  if(nb)nb.innerHTML='<span class="ic">🤖</span>AI';

  console.log('AI Advanced Features loaded!');
})();

</script>

window.imageToQuiz = function(imgBase64, mimeType, callback){
  showToast('AI image padh raha hai...', 'info');

  fetch(GEMINI_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {text: prompt},
        {inline_data:{mime_type: mimeType, data: imgBase64}}
      ]}],
      generationConfig:{temperature:0.2, maxOutputTokens:2000}
    })
  })
  .then(function(r){return r.json();})

};

// ── Gemini Text AI (Hindi default, vision capable) ───────────────
window.askGemini = function(userText, imgBase64, mimeType, historyArr, callback){
  var sysParts = [{text:'Tum BSEB Class 12 ke AI sahayak ho. Hamesha Hindi mein jawab do jab tak user English mein specifically na kahe. Clear, concise aur helpful. Aaj: '+new Date().toLocaleDateString('hi-IN')+'.'}];

  var userParts = [];
  if(imgBase64) userParts.push({inline_data:{mime_type:mimeType||'image/jpeg', data:imgBase64}});
  userParts.push({text: userText});
  contents.push({role:'user', parts:userParts});

  fetch(GEMINI_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts: sysParts},

    if(!a||!b||!c||!d){showToast('Char options chahiye!','warning');return;}
    var ans=parseInt((document.getElementById('bank-ans')||{}).value)||0;
    bank.push({type:'obj',q:q,opts:[a,b,c,d],ans:ans});
  } else {
    var answer=(document.getElementById('bank-answer')||{}).value||'';
    bank.push({type:'sub',q:q,a:answer});
  }
  saveCustomBank(bank);
  showToast('Question add ho gaya!','success');
  setTimeout(window.renderCustomBank,400);
};

window.startCustomTest = function(){
  var bank=loadCustomBank();
  if(!bank.length){showToast('Pehle questions add karo!','warning');return;}
  // convert to test format
  var qs=bank.map(function(q){
    if(q.type==='obj') return {q:q.q, opts:q.opts, ans:q.ans};
    return {q:q.q, opts:[q.a||'Answer dekhein','—','—','—'], ans:0};
  });
  if(window.startLiveTest) window.startLiveTest({testName:'Custom Quiz', duration:Math.ceil(qs.length*1.5), questions:qs, subject:'custom'});
};

var MB = {
  roomId: null, isHost: false, playerName: null,
  unsubscribe: [], gameActive: false
};

    +'<input id="mb-name" value="'+esc(myName)+'" placeholder="Aapka naam" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px">'
    +'<select id="mb-timer" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px"><option value="10">10 sec/question</option><option value="15" selected>15 sec/question</option><option value="20">20 sec/question</option><option value="30">30 sec/question</option></select>'
    +'<select id="mb-qcount" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px"><option value="5">5 Questions</option><option value="10" selected>10 Questions</option><option value="15">15 Questions</option><option value="20">20 Questions</option></select>'
    +'<button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="window.mbCreateRoom()">🏠 Room Banao (Host)</button>'
    +'<div style="text-align:center;color:var(--text-faint);font-size:12px;margin-bottom:8px">— ya kisi room mein join karo —</div>'
    +'<input id="mb-room-inp" placeholder="Room Code daalo (4 digits)" maxlength="6" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:8px;text-align:center;letter-spacing:4px;font-size:20px;font-weight:700">'
    +'<button class="btn" style="width:100%;background:var(--good);border:none;color:#000;border-radius:10px;padding:12px" onclick="window.mbJoinRoom()">Join Room</button>'

window.mbCreateRoom = function(){
  if(!window._fbReady){showToast('Firebase needed for multiplayer','warning');return;}
  var name=(document.getElementById('mb-name')||{}).value||(window.S&&window.S.displayName)||'Host';
  var timerSec=parseInt((document.getElementById('mb-timer')||{}).value)||15;
  var qcount=parseInt((document.getElementById('mb-qcount')||{}).value)||10;
  var roomId=Math.floor(1000+Math.random()*9000).toString();
  MB.roomId=roomId; MB.isHost=true; MB.playerName=name;
  // Generate questions with AI or from bank
  var bank=loadCustomBank();
  var qs=[];
  if(bank.length>=qcount){
    bank.sort(function(){return Math.random()-.5;});
    qs=bank.slice(0,qcount).map(function(q){return q.type==='obj'?{q:q.q,opts:q.opts,ans:q.ans}:{q:q.q,opts:['—','—','—','—'],ans:0};});
  } else {
    // pull from QUIZ_DATA
    var allQs=[];
    Object.keys(window.SUBJECTS||{}).forEach(function(k){var s=window.SUBJECTS[k];if(s&&s.obj&&window.QUIZ_DATA&&window.QUIZ_DATA[s.obj])allQs=allQs.concat(window.QUIZ_DATA[s.obj]);});
    allQs.sort(function(){return Math.random()-.5;});
    qs=allQs.slice(0,qcount).map(function(q){return {q:q.q,opts:q.opts,ans:q.ans};});
  }
  var roomData={host:name,timerSec:timerSec,questions:qs,status:'waiting',players:{},created:Date.now()};
  roomData.players[name]={name:name,score:0,joined:Date.now()};
  window._fbRef('battle_rooms/'+roomId).set(roomData).then(function(){
    window.mbWaitingRoom(roomId);
  });
};

window.mbJoinRoom = function(){
  if(!window._fbReady){showToast('Firebase needed','warning');return;}
  var code=(document.getElementById('mb-room-inp')||{}).value||'';
  var name=(document.getElementById('mb-name')||{}).value||(window.S&&window.S.displayName)||'Player';
  if(!code){showToast('Room code daalo!','warning');return;}
  MB.roomId=code; MB.isHost=false; MB.playerName=name;
  window._fbRef('battle_rooms/'+code).once('value').then(function(snap){
    if(!snap.exists()){showToast('Room nahi mila!','danger');return;}
    var data=snap.val();
    if(data.status==='started'){showToast('Game already started!','warning');return;}
    // add player
    window._fbRef('battle_rooms/'+code+'/players/'+name).set({name:name,score:0,joined:Date.now()});
    window.mbWaitingRoom(code);
  });
};

window.mbWaitingRoom = function(roomId){
  var app=document.getElementById('app');if(!app)return;
  app.innerHTML='<div style="padding:4px 0 80px;text-align:center"><div class="admit-title">Waiting Room</div><div style="font-size:48px;margin:20px 0">⏳</div><div style="font-size:36px;font-weight:900;color:var(--lamp);letter-spacing:8px;margin-bottom:8px">'+roomId+'</div><div style="color:var(--text-faint);font-size:13px;margin-bottom:24px">Doston ko yeh code share karo!</div><div id="mb-players-list" style="margin-bottom:20px"><div style="color:var(--text-faint)">Loading...</div></div>'
    +(MB.isHost?'<button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="window.mbStartGame()">Start Game!</button>':'<div style="color:var(--text-faint);font-size:13px">Host ke Start karne ka intezar karo...</div>')
    +'<button class="btn btn-ghost" style="width:100%;margin-top:12px" onclick="if(MB.roomId&&window._fbRef)window._fbRef(\'battle_rooms/\'+MB.roomId+\'/players/\'+MB.playerName).remove();MB.roomId=null;window.renderMultiplayerBattle()">Leave</button></div>';
  window.scrollTo(0,0);

  // Listen for players
  window._fbRef('battle_rooms/'+roomId+'/players').on('value',function(snap){
    var pl=document.getElementById('mb-players-list');if(!pl)return;
    if(!snap.exists()){pl.innerHTML='<div style="color:var(--text-faint)">Koi player nahi</div>';return;}
    var players=[];snap.forEach(function(c){players.push(c.val());});
    pl.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">Players ('+players.length+'):</div>'+players.map(function(p){return '<div style="background:var(--panel);border-radius:8px;padding:8px 14px;margin-bottom:6px;font-size:14px">'+esc(p.name)+(p.name===MB.playerName?' (You)':'')+'</div>';}).join('');
  });

  // Listen for game start
  window._fbRef('battle_rooms/'+roomId+'/status').on('value',function(snap){
    if(snap.val()==='started') window.mbPlayGame(roomId);
  });
};

window.mbStartGame = function(){
  if(!MB.roomId||!MB.isHost)return;
  window._fbRef('battle_rooms/'+MB.roomId+'/status').set('started');
};

window.mbPlayGame = function(roomId){
  if(MB.gameActive)return;
  MB.gameActive=true;
  window._fbRef('battle_rooms/'+roomId).once('value').then(function(snap){
    if(!snap.exists())return;
    var data=snap.val();
    var qs=data.questions||[];
    var timerSec=data.timerSec||15;
    var idx=0;
    var scores={};
    var players=Object.keys(data.players||{});
    players.forEach(function(p){scores[p]=0;});

    function renderQ(){
      if(idx>=qs.length){endGame();return;}
      var q=qs[idx];
      var app=document.getElementById('app');if(!app)return;
      var timeLeft=timerSec;
      var letters=['A','B','C','D'];
      var answered=false;

      app.innerHTML='<div style="padding:4px 0 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;color:var(--text-faint)">Q'+(idx+1)+'/'+qs.length+'</div><div id="mb-tmr" style="font-family:JetBrains Mono,monospace;font-size:28px;font-weight:900;color:var(--lamp)">'+timeLeft+'</div></div>'
        +'<div class="qcard"><div class="qtext">'+esc(q.q)+'</div><div class="omr-list">'
        +letters.map(function(l,i){return '<div class="omr-opt" id="mb-opt-'+i+'" onclick="window.mbAnswer('+i+','+q.ans+')"><span class="bubble">'+l+'</span><span class="opt-text">'+esc((q.opts&&q.opts[i])||l)+'</span></div>';}).join('')
        +'</div><div id="mb-fb" style="min-height:28px;margin-top:8px"></div></div>'
        +'<div id="mb-scoreboard" style="margin-top:12px;background:var(--panel);border-radius:12px;padding:12px"></div>'
        +'</div>';

      // update scores display
      function updateScores(){
        window._fbRef('battle_rooms/'+roomId+'/players').once('value').then(function(snap2){
          var sc=document.getElementById('mb-scoreboard');if(!sc)return;
          var arr=[];if(snap2.exists())snap2.forEach(function(c){arr.push(c.val());});
          arr.sort(function(a,b){return(b.score||0)-(a.score||0);});
          sc.innerHTML='<div style="font-size:12px;font-weight:700;margin-bottom:6px">Scores:</div>'+arr.map(function(p,i){return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>'+(i+1)+'. '+esc(p.name)+'</span><span style="color:var(--lamp);font-weight:700">'+(p.score||0)+'</span></div>';}).join('');
        });
      }
      updateScores();

      window.mbAnswer=function(chosen,correct){
        if(answered)return; answered=true;
        clearInterval(countdown);
        var opts=['mb-opt-0','mb-opt-1','mb-opt-2','mb-opt-3'];
        opts.forEach(function(id,i){var el=document.getElementById(id);if(el){el.classList.add('disabled');if(i===correct)el.classList.add('correct');if(i===chosen&&i!==correct)el.classList.add('wrong');}});
        var fb=document.getElementById('mb-fb');
        if(chosen===correct){
          var pts=Math.max(1,timeLeft)*10;
          scores[MB.playerName]=(scores[MB.playerName]||0)+pts;
          window._fbRef('battle_rooms/'+roomId+'/players/'+MB.playerName+'/score').transaction(function(s){return (s||0)+pts;});
          if(fb)fb.innerHTML='<div class="feedback good">Correct! +'+pts+' pts</div>';
          if(window.celebrateCorrect)window.celebrateCorrect();
        } else {
          if(fb)fb.innerHTML='<div class="feedback bad">Wrong!</div>';
        }
        setTimeout(function(){idx++;renderQ();updateScores();},1800);
      };

      var countdown=setInterval(function(){
        timeLeft--;
        var te=document.getElementById('mb-tmr');if(te){te.textContent=timeLeft;te.style.color=timeLeft<=5?'#ff4444':'var(--lamp)';}
        if(timeLeft<=0){clearInterval(countdown);if(!answered){answered=true;idx++;setTimeout(function(){renderQ();},1000);}};
      },1000);
    }

    function endGame(){
      MB.gameActive=false;
      window._fbRef('battle_rooms/'+roomId+'/players').once('value').then(function(snap){
        var arr=[];if(snap.exists())snap.forEach(function(c){arr.push(c.val());});
        arr.sort(function(a,b){return(b.score||0)-(a.score||0);});
        var app=document.getElementById('app');if(!app)return;
        var medals=['🥇','🥈','🥉'];
        app.innerHTML='<div class="result-wrap"><div style="font-size:48px">🏆</div><div class="result-pct">Game Over!</div><div style="width:100%;margin-top:16px">'+arr.map(function(p,i){return '<div class="lb-row" style="margin-bottom:8px"><div class="lb-rank">'+(medals[i]||i+1)+'</div><div class="lb-name">'+esc(p.name)+(p.name===MB.playerName?' (You)':'')+'</div><div class="lb-score" style="font-size:18px;font-weight:800">'+(p.score||0)+' pts</div></div>';}).join('')+'</div><button class="btn btn-ghost" style="width:100%;margin-top:16px" onclick="MB.gameActive=false;window.renderMultiplayerBattle()">Play Again</button></div>';
        window.scrollTo(0,0);
        // cleanup room after 60s
        setTimeout(function(){if(MB.isHost&&window._fbRef)window._fbRef('battle_rooms/'+MB.roomId).remove();},60000);
      });
    }
    renderQ();
  });
};
