<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>उत्तर पुस्तिका · BSEB 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#11141c;
  --paper:#1c2029;
  --paper-2:#222736;
  --rule:#2a3042;
  --margin:#b8453f;
  --margin-dim:#7d3b38;
  --lamp:#e3a83f;
  --lamp-dim:#c98f2e;
  --good:#7faa82;
  --good-dim:#3b4a3c;
  --bad:#c0594f;
  --bad-dim:#4a3535;
  --text:#ece6da;
  --text-dim:#999fb0;
  --text-faint:#646b7d;
  --graphite:#3d4250;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  background-image:radial-gradient(ellipse 600px 400px at 50% -10%, rgba(227,168,63,0.08), transparent 70%);
}
.serif{font-family:'Tiro Devanagari Hindi',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
#shell{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#app{flex:1;padding:16px 16px 90px;}
button{font-family:inherit;}

/* ---------- Admit-card header ---------- */
.admit{
  position:relative;
  background:linear-gradient(180deg,var(--paper-2),var(--paper));
  border:1px solid var(--rule);
  border-radius:var(--radius);
  padding:16px 16px 14px 30px;
  margin-bottom:18px;
  overflow:hidden;
  animation:slideDown .4s ease;
}
.admit::before{
  content:"";position:absolute;left:18px;top:0;bottom:0;width:2px;background:var(--margin-dim);
}
.admit::after{
  content:"";position:absolute;left:8px;top:14px;width:6px;height:6px;border-radius:50%;
  background:var(--ink);box-shadow:0 30px 0 var(--ink),0 60px 0 var(--ink);
}
.admit-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.admit-title{font-family:'Tiro Devanagari Hindi',serif;font-size:20px;color:var(--lamp);line-height:1.2;}
.admit-sub{font-size:11px;color:var(--text-faint);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.admit-meta{margin-top:10px;display:flex;gap:18px;}
.admit-meta div span{display:block;}
.admit-meta .lbl{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;}
.admit-meta .val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);margin-top:2px;}
.stamp{
  position:relative;flex-shrink:0;width:62px;height:62px;border-radius:50%;
  border:2px double var(--margin);color:var(--margin);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transform:rotate(-9deg);opacity:.88;text-align:center;
}
.stamp b{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1;}
.stamp small{font-size:7px;letter-spacing:.05em;margin-top:1px;}

/* ---------- Generic sections ---------- */
.section-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin:18px 2px 8px;}
.section-label:first-child{margin-top:0;}

/* ---------- Subject grid ---------- */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.subj-card{
  background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);
  padding:16px 12px;text-align:left;cursor:pointer;color:var(--text);
  transition:transform .15s ease, border-color .15s ease;
  animation:riseIn .35s ease backwards;
}
.subj-card:nth-child(1){animation-delay:.02s}
.subj-card:nth-child(2){animation-delay:.06s}
.subj-card:nth-child(3){animation-delay:.10s}
.subj-card:nth-child(4){animation-delay:.14s}
.subj-card:nth-child(5){animation-delay:.18s}
.subj-card:nth-child(6){animation-delay:.22s}
.subj-card:active{transform:scale(.97);}
.subj-icon{font-size:26px;display:block;margin-bottom:8px;}
.subj-name{font-weight:700;font-size:14px;}
.subj-hi{font-family:'Tiro Devanagari Hindi',serif;font-size:12px;color:var(--text-dim);margin-top:1px;}
.subj-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lamp-dim);margin-top:6px;}

/* ---------- Buttons ---------- */
.btn{
  display:block;width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--rule);
  background:var(--paper-2);color:var(--text);font-size:14px;font-weight:600;text-align:left;
  cursor:pointer;margin-bottom:9px;transition:transform .12s ease, border-color .15s ease;
}
.btn:active{transform:scale(.985);}
.btn-primary{background:linear-gradient(180deg,#f0b652,var(--lamp));color:#241a08;border:none;text-align:center;}
.btn-ghost{background:transparent;text-align:center;color:var(--text-dim);border:1px dashed var(--rule);}
.btn-row{display:flex;gap:9px;}
.btn-row .btn{flex:1;}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-dim);font-size:13px;padding:4px 0;margin-bottom:10px;cursor:pointer;}

/* ---------- Number / resume grid ---------- */
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:16px;}
.num-chip{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:var(--paper);border:1px solid var(--rule);border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);cursor:pointer;
}
.num-chip:active{transform:scale(.92);}
.num-chip.done{border-color:var(--good-dim);color:var(--good);}

/* ---------- Quiz card ---------- */
.qcard{
  background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);
  padding:18px 18px 18px 30px;position:relative;margin-bottom:14px;
  background-image:repeating-linear-gradient(to bottom, transparent 0 31px, var(--rule) 31px 32px);
  background-position:0 6px;
  animation:riseIn .3s ease;
}
.qcard::before{content:"";position:absolute;left:19px;top:0;bottom:0;width:2px;background:var(--margin-dim);}
.qmeta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);margin-bottom:10px;}
.qmeta-right{display:flex;align-items:center;gap:6px;}
.flag-btn{background:none;border:none;font-size:15px;line-height:1;cursor:pointer;padding:0 2px;color:var(--text-faint);}
.flag-btn.active{color:var(--lamp);}
.qnav{display:flex;align-items:center;gap:8px;margin-top:10px;}
.qnav-btn{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--panel-2,rgba(255,255,255,.05));color:var(--text);
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  padding:7px 10px;white-space:nowrap;
}
.qnav-btn:disabled{opacity:.35;}
.qnav-progress{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
.qnav-fill{height:100%;background:linear-gradient(90deg,var(--lamp-dim),var(--lamp));transition:width .25s ease;}
.qtext{font-size:16.5px;line-height:1.55;color:var(--text);font-weight:500;min-height:24px;}

/* ---------- OMR options ---------- */
.omr-list{margin-top:16px;}
.omr-opt{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;
  border:1px solid var(--rule);margin-bottom:8px;cursor:pointer;background:var(--paper-2);
  transition:border-color .15s ease;
}
.omr-opt .bubble{
  width:30px;height:30px;border-radius:50%;border:2px solid var(--text-faint);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text-dim);position:relative;overflow:hidden;
}
.omr-opt .bubble::after{
  content:"";position:absolute;inset:3px;border-radius:50%;background:var(--graphite);
  transform:scale(0);transition:transform .22s cubic-bezier(.34,1.4,.64,1);
}
.omr-opt.selected .bubble::after{transform:scale(1);}
.omr-opt.selected .bubble{border-color:var(--graphite);color:var(--text);}
.omr-opt .opt-text{font-size:14px;line-height:1.4;}
.omr-opt.correct{border-color:var(--good);background:rgba(127,170,130,0.10);}
.omr-opt.correct .bubble{border-color:var(--good);}
.omr-opt.correct .bubble::after{background:var(--good);}
.omr-opt.wrong{border-color:var(--bad);background:rgba(192,89,79,0.10);}
.omr-opt.wrong .bubble{border-color:var(--bad);}
.omr-opt.wrong .bubble::after{background:var(--bad);}
.omr-opt.disabled{cursor:default;}

.feedback{
  margin-top:4px;padding:11px 13px;border-radius:10px;font-size:13.5px;line-height:1.5;
  animation:riseIn .25s ease;
}
.feedback.good{background:rgba(127,170,130,0.12);color:var(--good);border:1px solid var(--good-dim);}
.feedback.bad{background:rgba(192,89,79,0.12);color:var(--bad);border:1px solid var(--bad-dim);}

/* ---------- Flashcard (2M/5M) ---------- */
.answer-block{
  margin-top:14px;padding-top:14px;border-top:1px dashed var(--rule);
  font-size:14px;line-height:1.7;color:var(--text-dim);white-space:pre-line;
  animation:riseIn .3s ease;
}
.answer-label{font-size:11px;color:var(--lamp-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}

/* ---------- Score strip ---------- */
.score-strip{display:flex;gap:10px;margin-bottom:14px;}
.score-pill{flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:10px;text-align:center;}
.score-pill b{display:block;font-family:'JetBrains Mono',monospace;font-size:18px;}
.score-pill span{font-size:10px;color:var(--text-faint);text-transform:uppercase;}
.score-pill.c b{color:var(--good);} .score-pill.w b{color:var(--bad);} .score-pill.s b{color:var(--text-dim);}

/* ---------- Result ---------- */
.result-wrap{text-align:center;padding:24px 10px;}
.result-pct{font-family:'JetBrains Mono',monospace;font-size:48px;color:var(--lamp);}
.result-line{font-family:'Tiro Devanagari Hindi',serif;font-size:18px;margin:6px 0 20px;}

/* ---------- Bottom nav ---------- */
.navbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  display:flex;background:var(--paper-2);border-top:1px solid var(--rule);
}
.navbtn{
  flex:1;padding:13px 0 11px;text-align:center;background:none;border:none;color:var(--text-faint);
  font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.navbtn .ic{font-size:18px;}
.navbtn.active{color:var(--lamp);}

/* ---------- Chat ---------- */
.chat-log{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.msg{max-width:84%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;animation:riseIn .25s ease;}
.msg.user{align-self:flex-end;background:var(--lamp-dim);color:#241a08;border-radius:12px 12px 2px 12px;}
.msg.bot{align-self:flex-start;background:var(--paper-2);border:1px solid var(--rule);border-radius:12px 12px 12px 2px;white-space:pre-line;}
.msg.typing{align-self:flex-start;color:var(--text-faint);font-style:italic;}
.chat-input-row{display:flex;gap:8px;position:sticky;bottom:0;}
.chat-input{
  flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:10px;color:var(--text);
  padding:11px 13px;font-size:14px;font-family:inherit;resize:none;
}
.chat-send{background:var(--lamp);border:none;border-radius:10px;width:46px;color:#241a08;font-size:18px;cursor:pointer;}
.key-box{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);padding:16px;}
.key-box input{
  width:100%;background:var(--paper-2);border:1px solid var(--rule);border-radius:8px;color:var(--text);
  padding:11px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;margin:10px 0;
}
.key-box a{color:var(--lamp);text-decoration:none;border-bottom:1px dotted var(--lamp-dim);}
.key-note{font-size:12px;color:var(--text-faint);line-height:1.6;}
.changekey{font-size:11px;color:var(--text-faint);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;margin-bottom:10px;}

.dev-banner{
  text-align:center;
  padding:14px 8px 10px;
  font-family:'JetBrains Mono',monospace;
  font-weight:800;
  font-size:26px;
  letter-spacing:3px;
  color:#fff6e0;
  user-select:none;
  overflow:visible;
}
.dev-letter{
  display:inline-block;
  opacity:0;
  will-change:transform,opacity,filter;
  animation-name: devFlyIn, devShake;
  animation-duration: .75s, var(--sd, 2.6s);
  animation-timing-function: cubic-bezier(.34,1.56,.64,1), ease-in-out;
  animation-iteration-count: 1, infinite;
  animation-fill-mode: forwards, none;
  animation-delay: var(--d, 0s), calc(var(--d, 0s) + .75s);
}
@keyframes devFlyIn{
  0%{ opacity:0; transform:translate(var(--dx,0),var(--dy,-30px)) rotate(var(--dr,-15deg)) scale(2.6); filter:hue-rotate(var(--ho,0deg)) brightness(1.8); text-shadow:0 0 10px var(--lamp),0 0 26px var(--lamp),0 0 44px var(--lamp-dim); }
  70%{ opacity:1; transform:translate(0,0) rotate(0deg) scale(.92); filter:hue-rotate(var(--ho,0deg)) brightness(1.2); }
  100%{ opacity:1; transform:translate(0,0) rotate(0deg) scale(1); filter:hue-rotate(var(--ho,0deg)) brightness(1); text-shadow:0 0 4px var(--lamp),0 0 10px var(--lamp),0 0 18px var(--lamp-dim),0 0 30px var(--lamp-dim); }
}
@keyframes devShake{
  0%{ transform:translate(0,0) rotate(0deg); filter:hue-rotate(calc(var(--ho,0deg) + 0deg)); text-shadow:0 0 4px var(--lamp),0 0 10px var(--lamp),0 0 18px var(--lamp-dim),0 0 30px var(--lamp-dim); }
  20%{ transform:translate(1.5px,-1.5px) rotate(-4deg); filter:hue-rotate(calc(var(--ho,0deg) + 70deg)); text-shadow:0 0 6px var(--lamp),0 0 14px var(--lamp),0 0 24px var(--lamp-dim),0 0 36px var(--lamp-dim); }
  40%{ transform:translate(-1.5px,1.5px) rotate(3deg); filter:hue-rotate(calc(var(--ho,0deg) + 150deg)); text-shadow:0 0 8px var(--lamp),0 0 16px var(--lamp),0 0 26px var(--lamp-dim); }
  60%{ transform:translate(1.5px,1.5px) rotate(-3deg); filter:hue-rotate(calc(var(--ho,0deg) + 230deg)); text-shadow:0 0 8px var(--lamp),0 0 16px var(--lamp),0 0 26px var(--lamp-dim),0 0 38px var(--lamp-dim); }
  80%{ transform:translate(-1.5px,-1.5px) rotate(4deg); filter:hue-rotate(calc(var(--ho,0deg) + 300deg)); text-shadow:0 0 3px var(--lamp),0 0 8px var(--lamp),0 0 14px var(--lamp-dim); }
  100%{ transform:translate(0,0) rotate(0deg); filter:hue-rotate(calc(var(--ho,0deg) + 360deg)); text-shadow:0 0 4px var(--lamp),0 0 10px var(--lamp),0 0 18px var(--lamp-dim),0 0 30px var(--lamp-dim); }
}

/* ---------- Correct-answer celebration ---------- */
#shell.flash-correct{ animation: screenFlash .55s ease-out; }
@keyframes screenFlash{
  0%{ box-shadow: inset 0 0 0 0 rgba(227,168,63,0); }
  18%{ box-shadow: inset 0 0 90px 24px rgba(227,168,63,.6); }
  100%{ box-shadow: inset 0 0 0 0 rgba(227,168,63,0); }
}
.emoji-burst{ position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
.emoji-pop{
  position:absolute;
  bottom:8vh;
  font-size:30px;
  opacity:0;
  animation: emojiFloat var(--dur,1.2s) ease-out forwards;
}
@keyframes emojiFloat{
  0%{ opacity:0; transform:translate(0,0) scale(.3) rotate(0deg); }
  15%{ opacity:1; transform:translate(0,-14px) scale(1.25) rotate(calc(var(--rot,0deg)/4)); }
  100%{ opacity:0; transform:translate(var(--dx,0),-68vh) scale(.75) rotate(var(--rot,0deg)); }
}

/* ---------- Animations ---------- */
@keyframes riseIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

/* ── Formula Sheet ── */
.formula-root{padding:4px 0 80px;}
.formula-subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.formula-subj-btn{background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;color:var(--text);font-size:13px;font-weight:700;line-height:1.4;}
.formula-subj-btn .fi{font-size:28px;display:block;margin-bottom:6px;}
.formula-chapter-list{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.formula-chapter-btn{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:13px 16px;cursor:pointer;color:var(--text);font-size:14px;text-align:left;width:100%;}
.formula-chapter-btn:active{border-color:var(--lamp);}
.formula-items{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.formula-item{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--text);line-height:1.65;font-family:'JetBrains Mono',monospace;}
/* ── Leaderboard ── */
.lb-root{padding:4px 0 80px;}
.lb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0 16px;}
.lb-stat{background:var(--panel);border-radius:12px;padding:12px 8px;text-align:center;}
.lb-stat .sv{font-size:22px;font-weight:800;color:var(--lamp);}
.lb-stat .sl{font-size:10px;color:var(--text-faint);margin-top:2px;}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;margin-bottom:7px;}
.lb-rank{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;color:var(--lamp);width:28px;text-align:center;flex-shrink:0;}
.lb-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.lb-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--lamp);text-align:right;line-height:1.6;}
.lb-you{border-color:var(--lamp) !important;background:rgba(227,168,63,.07) !important;}

/* ── Gamification ── */
@keyframes badgePop{from{transform:translateX(-50%) scale(.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.xp-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-top:4px}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--lamp-dim),var(--lamp));border-radius:6px;transition:width .5s}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,80,0,.15);border:1px solid rgba(255,80,0,.4);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:#ff8800}
</style>
