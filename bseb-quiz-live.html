"P(A)","1+P(A)","P(A)-1","1-P(A)"],"ans":3}],"PHY_S2":[{"q":"1. कूलॉम के नियम का सदिश रूप लिखिए।","a":"F = (1/4πε₀)(q1q2/r²) r̂ — बल आवेशों को मिलाने वाली रेखा की दिशा में; समान आवेशों में प्रतिकर्षण (r̂ दिशा में), विपरीत आवेशों में आकर्षण (-r̂ दिशा में)।"},{"q":"2. विद्युत क्षेत्र रेखाओं के गुणधर्म लिखिए।","a":"(1) धन आवेश से प्रारम्भ, ऋण पर समाप्त (2) दो रेखाएँ कभी नहीं काटतीं (3) सघन रेखाएँ = प्रबल क्षेत्र (4) समविभव पृष्ठ के लम्बवत् होती हैं।"},{"q":"3. गॉस के नियम का उपयोग कर गोलीय कोश के कारण विद्युत क्षेत्र ज्ञात कीजिए।","a":"गाउस नियम ∮E·dA=q/ε₀ से: कोश के बाहर (r>R) E=Q/(4πε₀r²) (बिन्दु आवेश जैसा); कोश के भीतर (r<R) E=0 क्योंकि संलग्न आवेश शून्य।"},{"q":"4. विद्युत द्विध्रुव के कारण अक्षीय स्थिति में विद्युत क्षेत्र का सूत्र लिखें।","a":"E=(1/4πε₀)×(2p)/r³ (r>>a), जहाँ p=द्विध्रुव आघूर्ण; दिशा द्विध्रुव अक्ष के अनुदिश (p की दिशा में)।"},{"q":"5. ओम के नियम की सीमाएँ क्या हैं?","a":"(1) उच्च ताप पर अर्धचालकों/तंतुओं में लागू नहीं — R ताप पर निर्भर (2) डायोड, ट्रांजिस्टर में लागू नहीं — V-I ग्राफ रेखीय नहीं होता।"},{"q":"6. वैद्युत वाहक बल एवं विभवान्तर में अन्तर लिखें।","a":"EMF (ε): बिना धारा के सेल के टर्मिनलों का विभवान्तर (कुल ऊर्जा/आवेश)। विभवान्तर (V): धारा प्रवाह में बाह्य परिपथ के दो बिन्दुओं का अन्तर — V=ε-Ir; सदैव ε>V (धारा प्रवाह में)।"},{"q":"7. हीटस्टोन सेतु का सिद्धान्त समझाइए।","a":"P,Q,R,S प्रतिरोध चतुर्भुज ABCD की भुजाओं में, बैटरी एक विकर्ण पर, धारामापी दूसरे पर। संतुलन (Ig=0) पर P/Q=R/S — इस सम्बन्ध से अज्ञात प्रतिरोध ज्ञात होता है।"},{"q":"8. बायो-सेवार्ट नियम लिखें एवं समझाएँ।","a":"dB=(μ₀/4π)(I dl sinθ)/r² — धारावाही तत्व dl द्वारा किसी बिन्दु पर उत्पन्न क्षेत्र; दिशा dl×r̂ की ओर (दक्षिणावर्त नियम से)।"},{"q":"9. एम्पियर का परिपथीय नियम लिखें।","a":"∮B·dl=μ₀Ienc — बंद पथ पर B के घटक का योग, उस पथ से संलग्न कुल धारा का μ₀ गुना। सोलेनॉइड/टोरॉइड में क्षेत्र ज्ञात करने में उपयोगी।"},{"q":"10. लेंज का नियम लिखें।","a":"प्रेरित emf/धारा सदैव उस कारण (फ्लक्स परिवर्तन) का विरोध करती है जिससे उत्पन्न हुई — ε=-N(dΦ/dt) में ऋणात्मक चिह्न यही दर्शाता है। यह ऊर्जा संरक्षण पर आधारित है।"},{"q":"11. फैराडे का विद्युत चुम्बकीय प्रेरण का नियम लिखें।","a":"(1) जब फ्लक्स में परिवर्तन होता है, emf प्रेरित होता है (2) प्रेरित emf का परिमाण = फ्लक्स परिवर्तन की दर: ε=-N(dΦ/dt)।"},{"q":"12. प्रत्यावर्ती धारा एवं दिष्ट धारा में अन्तर लिखें।","a":"AC: परिमाण व दिशा sinusoidal बदलती है, ट्रांसफार्मर से सरलता से रूपांतरित। DC: परिमाण व दिशा स्थिर, ट्रांसफार्मर से रूपांतरित नहीं होती।"},{"q":"13. प्रकाश के परावर्तन के नियम लिखें।","a":"(1) आपतन कोण = परावर्तन कोण (∠i=∠r) (2) आपतित किरण, परावर्तित किरण तथा अभिलम्ब — तीनों एक ही तल में।"},{"q":"14. लेंस मेकर सूत्र लिखें।","a":"1/f=(n-1)(1/R₁-1/R₂) — n=लेंस पदार्थ का माध्यम के सापेक्ष अपवर्तनांक, R₁ व R₂=दोनों पृष्ठों की वक्रता त्रिज्याएँ (चिह्न परिपाटी से)।"},{"q":"15. प्रकाश का पूर्ण आन्तरिक परावर्तन समझाएँ।","a":"जब प्रकाश सघन→विरल माध्यम में जाए तथा आपतन कोण क्रांतिक कोण θc से अधिक हो, तो प्रकाश पूर्णतः परावर्तित होता है — sinθc=1/n (n=सघन का विरल के सापेक्ष अपवर्तनांक)।"},{"q":"16. व्यतिकरण एवं विवर्तन में अन्तर लिखें।","a":"व्यतिकरण: दो कलासंगत स्रोतों की तरंगों के अध्यारोपण से, फ्रिंज चौड़ाई समान β=λD/d। विवर्तन: एक तरंगाग्र के विभिन्न भागों के अध्यारोपण से, केन्द्रीय उच्चिष्ठ अन्य से अधिक चौड़ा व तीव्र।"},{"q":"17. यंग का द्विझिरी प्रयोग समझाइए।","a":"दो संकीर्ण झिरियों S1,S2 (दूरी d) से कलासंगत तरंगें पर्दे (दूरी D) पर व्यतिकरण करके फ्रिंजें बनाती हैं; फ्रिंज चौड़ाई β=λD/d — यह प्रकाश की तरंग प्रकृति सिद्ध करता है।"},{"q":"18. प्रकाश विद्युत प्रभाव क्या है?","a":"ν≥ν₀ आवृत्ति का प्रकाश धातु पर पड़ने से फोटोइलेक्ट्रॉन उत्सर्जित होते हैं — आइंस्टीन समीकरण: KEmax=hν-φ₀ (φ₀=कार्य फलन)।"},{"q":"19. डी-ब्रॉग्ली तरंगदैर्ध्य का सूत्र लिखें।","a":"λ=h/p=h/mv — गतिशील कणों (जैसे e⁻) में तरंग-गुण होते हैं; द्रव्यमान व वेग बढ़ने पर तरंगदैर्ध्य घटती है।"},{"q":"20. नाभिकीय संलयन एवं विखण्डन में अन्तर लिखें।","a":"विखण्डन: भारी नाभिक (U-235) मंद न्यूट्रॉन से टूटकर दो हल्के नाभिक+न्यूट्रॉन+ऊर्जा देता है — श्रृंखला अभिक्रिया। संलयन: दो हल्के नाभिक अत्यंत उच्च ताप-दाब पर जुड़कर भारी नाभिक+विशाल ऊर्जा देते हैं (सूर्य का ऊर्जा स्रोत)।"},{"q":"21. द्रव्यमान क्षति एवं बन्धन ऊर्जा को समझाइए।","a":"Δm=[Zmp+(A-Z)mn]-M(नाभिक) — वास्तविक द्रव्यमान, घटकों के योग से कम। यह द्रव्यमान क्षति E=mc² से बन्धन ऊर्जा BE=Δm×c² में परिवर्तित होकर न्यूक्लिऑनों को आबद्ध रखती है।"},{"q":"22. N-type एवं P-type अर्धचालकों में अन्तर लिखें।","a":"N-type: पंचसंयोजी अपद्रव्य (P, As) मिलाने से, बहुसंख्यक वाहक=इलेक्ट्रॉन। P-type: त्रिसंयोजी अपद्रव्य (B, Al) मिलाने से, बहुसंख्यक वाहक=होल (छिद्र)।"},{"q":"23. P-N सन्धि डायोड का अग्र अभिनति में कार्यविधि समझाएँ।","a":"P→(+), N→(-) बैटरी से जोड़ने पर: बाह्य क्षेत्र आंतरिक क्षेत्र का विरोध करता है, अवक्षय परत संकरी होती है, बहुसंख्यक वाहक संधि पार कर mA क्रम में धारा प्रवाहित होती है।"},{"q":"24. NOT गेट का प्रतीक एवं सत्यता सारणी बनाएँ।","a":"प्रतीक: त्रिभुज+आउटपुट पर छोटा वृत्त (बबल)। सत्यता सारणी: A=0→Y=1, A=1→Y=0; बूलियन: Y=Ā — इसे प्रतिलोमक (Inverter) भी कहते हैं।"},{"q":"25. ट्रांजिस्टर के उपयोग लिखें।","a":"(1) प्रवर्धक (Amplifier): दुर्बल संकेत को बड़ा करना (2) स्विच: डिजिटल परिपथ में ON-OFF नियंत्रण। इसके अतिरिक्त दोलक व मॉडुलेटर परिपथों में भी प्रयुक्त।"},{"q":"26. मॉडुलन किसे कहते हैं? इसकी आवश्यकता बताएँ।","a":"संदेश संकेत के किसी अभिलक्षण (आयाम/आवृत्ति/कला) को उच्च आवृत्ति वाहक तरंग पर अध्यारोपित करना मॉडुलन है। आवश्यकता: निम्न आवृत्ति तरंगें लंबी दूरी तय नहीं कर पातीं, उच्च आवृत्ति वाहक से दक्ष संचरण संभव।"},{"q":"27. पृथ्वी के चुम्बकीय क्षेत्र के अवयवों के नाम लिखें।","a":"(1) दिक्पात (Declination): चुम्बकीय व भौगोलिक याम्योत्तर के बीच कोण (2) नति कोण (Inclination): परिणामी क्षेत्र का क्षैतिज तल से कोण (3) क्षैतिज घटक (H): पृथ्वी के चुम्बकीय क्षेत्र का क्षैतिज घटक।"},{"q":"28. विद्युत अनुनाद किसे कहते हैं?","a":"LCR परिपथ में XL=XC (अर्थात ωL=1/ωC) होने पर Z=R (न्यूनतम) व धारा अधिकतम — इसे विद्युत अनुनाद कहते हैं; अनुनाद कोणीय आवृत्ति ω₀=1/√(LC)।"},{"q":"29. संधारित्र की प्रतिघात का सूत्र लिखें।","a":"Xc=1/ωC=1/(2πfC); मात्रक=ओम (Ω); f बढ़ने पर Xc घटता है — DC (f=0) पर Xc=∞, अर्थात संधारित्र DC को पूर्णतः अवरोधित करता है।"},{"q":"30. शक्ति गुणांक किसे कहते हैं?","a":"cosφ=R/Z; वास्तविक शक्ति P=VrmsIrmscosφ; मान 0 से 1 के बीच। शुद्ध प्रतिरोधक परिपथ में φ=0 तो cosφ=1 (अधिकतम); शुद्ध प्रेरक/धारितीय में cosφ=0 (शक्ति शून्य)।"}],"CHE_S2":[{"q":"1. राउल्ट का नियम लिखें एवं इसकी सीमाएँ बताएँ।","a":"राउल्ट नियम: pA=xA×p°A (वाष्पशील घटक का आंशिक दाब=मोल-अंश×शुद्ध वाष्प दाब)। सीमाएँ: केवल आदर्श विलयनों व अत्यधिक तनु विलयनों पर लागू; ऋणात्मक/धनात्मक विचलन वाले विलयनों पर नहीं।"},{"q":"2. मोलरता एवं मोललता में अन्तर लिखें।","a":"मोलरता (M)=mol विलेय/L विलयन — ताप के साथ बदलती है (आयतन पर निर्भर)। मोललता (m)=mol विलेय/kg विलायक — ताप-स्वतंत्र (द्रव्यमान पर निर्भर); इसलिए मोललता अधिक सटीक होती है।"},{"q":"3. हेनरी का नियम लिखें एवं इसके अनुप्रयोग बताएँ।","a":"हेनरी नियम: p=KH×x (गैस का दाब उसकी घुलनशीलता के अनुक्रमानुपाती)। अनुप्रयोग: (1) सोडा/शीतल पेय में उच्च दाब पर CO2 घोली जाती है (2) गहरे समुद्र गोताखोरों के सिलिंडर में He मिलाकर N2 की घुलनशीलता कम की जाती है (decompression sickness से बचाव)।"},{"q":"4. अणुसंख्य गुणधर्म किन्हें कहते हैं? उदाहरण दें।","a":"विलेय कणों की संख्या पर निर्भर, प्रकृति पर नहीं। चार अणुसंख्य गुणधर्म: (1) वाष्प दाब अवनमन ΔP=x2×P° (2) क्वथनांक उन्नयन ΔTb=Kb×m (3) हिमांक अवनमन ΔTf=Kf×m (4) परासरण दाब π=CRT।"},{"q":"5. वान्ट हॉफ गुणांक क्या है?","a":"i=प्रेक्षित अणुसंख्य गुणधर्म/सैद्धांतिक अणुसंख्य गुणधर्म=वास्तविक कण संख्या/प्रारंभिक कण संख्या। वियोजन पर i>1 (जैसे NaCl में i≈2), संगुणन पर i<1, सामान्य पर i=1।"},{"q":"6. फैराडे के विद्युत अपघटन के नियम लिखें।","a":"प्रथम नियम: m=ZIt (निक्षेपित द्रव्यमान ∝ आवेश Q=It)। द्वितीय नियम: समान आवेश से विभिन्न इलेक्ट्रोलाइट में निक्षेपित द्रव्यमान उनके तुल्यांकी भारों के अनुक्रमानुपाती होते हैं।"},{"q":"7. मानक हाइड्रोजन इलेक्ट्रोड का नामांकित चित्र बनाएँ।","a":"Pt(s) | H2(g, 1bar) | H+(aq, 1M) — प्लैटिनम ब्लैक लेपित Pt प्लेट, 1M H+ विलयन में, 1bar H2 गैस प्रवाहित; 298K पर E°=0.00V (मानक सम्मेलन); सभी इलेक्ट्रोड विभव इसी के सापेक्ष मापे जाते हैं।"},{"q":"8. अभिक्रिया की कोटि एवं आण्विकता में अन्तर लिखें।","a":"कोटि (Order): प्रायोगिक वेग नियम में सान्द्रता घातांकों का योग; प्रयोग से ज्ञात; शून्य, भिन्नात्मक या ऋणात्मक हो सकती है। आण्विकता: प्राथमिक अभिक्रिया में भाग लेने वाले कणों की संख्या; सैद्धांतिक; सदैव धनात्मक पूर्णांक (1, 2 या 3)।"},{"q":"9. प्रथम कोटि की अभिक्रिया का वेग स्थिरांक का सूत्र लिखें।","a":"k=(2.303/t)log([A]₀/[A]); मात्रक=समय⁻¹ (s⁻¹); t1/2=0.693/k — प्रारंभिक सान्द्रता पर निर्भर नहीं (प्रथम कोटि की पहचान)।"},{"q":"10. सक्रियण ऊर्जा क्या है? आर्रेनियस समीकरण दें।","a":"सक्रियण ऊर्जा (Ea): अभिकारकों को सक्रिय संकुल अवस्था (transition state) तक पहुँचने हेतु आवश्यक न्यूनतम अतिरिक्त ऊर्जा। आर्रेनियस: k=Ae^(-Ea/RT); log k=log A-Ea/(2.303RT) — Ea अधिक हो तो k कम (धीमी अभिक्रिया)।"},{"q":"11. लैन्थेनाइड संकुचन क्या है?","a":"La से Lu (Z=57-71) में, नए 4f-e⁻ बढ़ते नाभिकीय आवेश को दुर्बल रूप से परिरक्षित करते हैं, जिससे बाह्यतम e⁻ अधिक आकर्षित होकर आयनिक त्रिज्या में क्रमिक कमी आती है — इसे लैन्थेनाइड संकुचन कहते हैं। परिणाम: 4d व 5d तत्वों (जैसे Zr-Hf) के आकार लगभग समान।"},{"q":"12. लैन्थेनाइड एवं एक्टिनाइड में अन्तर लिखें।","a":"लैन्थेनाइड (4f): सभी अरेडियोएक्टिव, मुख्य ऑक्सीकरण अवस्था +3 (स्थायी), रसायन एक-समान। एक्टिनाइड (5f): सभी रेडियोएक्टिव, ऑक्सीकरण अवस्थाएँ +3 से +6 (5f, 6d, 7s की समान ऊर्जा से), रसायन जटिल।"},{"q":"13. वर्नर का सिद्धान्त लिखें।","a":"वर्नर के दो अभिगृहीत: (1) धातु में दो संयोजकताएँ — प्राथमिक (ionizable, ऋणायनों द्वारा संतुष्ट, ऑक्सीकरण अवस्था) व द्वितीयक (non-ionizable, लिगैण्डों द्वारा संतुष्ट, उपसहसंयोजन संख्या) (2) द्वितीयक संयोजकता को संतुष्ट करने वाले लिगैण्ड धातु के चतुर्दिक निश्चित ज्यामितीय व्यवस्था (चतुष्फलकीय, वर्ग-समतलीय, अष्टफलकीय) में होते हैं।"},{"q":"14. प्रभावी परमाणु क्रमांक (EAN) किसे कहते हैं?","a":"EAN=परमाणु क्रमांक-ऑक्सीकरण अवस्था+(2×उपसहसंयोजन संख्या)। सिजविक के अनुसार अधिकांश स्थायी संकुलों में EAN निकटतम उत्कृष्ट गैस के परमाणु क्रमांक (36-Kr या 54-Xe) के बराबर होती है।"},{"q":"15. VSEPR सिद्धान्त के आधार पर NH₃ की आकृति समझाएँ।","a":"NH3 में N पर 3 N-H बंध युग्म+1 एकाकी युग्म=4 युग्म → sp³ संकरण। एकाकी युग्म-बंध युग्म प्रतिकर्षण>बंध-बंध प्रतिकर्षण से बंध कोण 109.5° से घटकर ~107° — आकृति त्रिकोणीय पिरामिडी।"},{"q":"16. sp³ एवं dsp² संकरण में अन्तर लिखें।","a":"sp³: s+3p → 4 समान कक्षक, 109.5° कोण, चतुष्फलकीय — उदाहरण [NiCl4]²⁻। dsp²: d+s+2p → 4 कक्षक, 90° कोण, वर्ग समतलीय — उदाहरण [Ni(CN)4]²⁻।"},{"q":"17. प्रेरक प्रभाव किसे कहते हैं?","a":"σ-बंध e⁻ घनत्व का अधिक विद्युत-ऋणात्मक परमाणु/समूह की ओर स्थायी विस्थापन। +I (alkyl, e⁻ दान), -I (हैलोजन, -NO2, e⁻ आकर्षण); दूरी के साथ क्षीण होता है। अम्लीयता, क्षारकता व अभिक्रियाशीलता प्रभावित।"},{"q":"18. अनुनाद प्रभाव समझाइए।","a":"संयुग्मित निकाय में π-e⁻/एकाकी युग्म का विस्थानीकरण — +M (e⁻ दान, -NH2,-OH), -M (e⁻ आकर्षण, -NO2,-CHO)। अनुनाद संरचनाओं का संकर बनाता है, अणु को अतिरिक्त स्थायित्व (अनुनाद ऊर्जा) देता है।"},{"q":"19. SN1 एवं SN2 अभिक्रिया में अन्तर लिखें।","a":"SN1: दो चरण — पहले C-X टूटकर कार्बोकैटायन (मंद, वेग-निर्धारक), फिर Nu जुड़ता है; वेग=k[RX]; 3°>2°>1°; रेसिमीकरण संभव। SN2: एक चरण — Nu पीछे से आक्रमण, बंध बनना-टूटना एक साथ; वेग=k[RX][Nu⁻]; 1°>2°>3°; Walden inversion होता है।"},{"q":"20. मार्कोनीकोव नियम लिखें एवं उदाहरण दें।","a":"असममित एल्कीन में HX का योग: H अधिक H वाले C से जुड़ता है (अधिक स्थायी कार्बोकैटायन बनाने के लिए)। उदाहरण: CH3-CH=CH2+HBr → CH3-CHBr-CH3 (2-ब्रोमोप्रोपेन, मुख्य उत्पाद)।"},{"q":"21. एल्कोहॉल एवं फिनोल में अन्तर लिखें।","a":"एल्कोहॉल: -OH sp³ कार्बन से जुड़ा, उदासीन, NaOH से लवण नहीं। फिनोल: -OH ऐरोमैटिक वलय (sp²) से जुड़ा, अनुनाद से अम्लीय, NaOH से सोडियम फिनॉक्साइड बनाता है।"},{"q":"22. राइमर-टीमान अभिक्रिया का रासायनिक समीकरण लिखें।","a":"C6H5OH + CHCl3 + 3KOH --(गर्म)--> o-HOC6H4CHO + 3KCl + 2H2O — फिनोल+क्लोरोफॉर्म+KOH से मुख्य उत्पाद सैलिसिलैल्डिहाइड।"},{"q":"23. एल्डोल संघनन समझाइए।","a":"α-H वाले एल्डिहाइड/कीटोन तनु NaOH से β-हाइड्रॉक्सी एल्डिहाइड (एल्डोल) बनाते हैं; गर्म करने पर जल निकलकर α,β-असंतृप्त यौगिक। उदाहरण: 2CH3CHO --(NaOH)--> CH3CH(OH)CH2CHO।"},{"q":"24. कैनिजारो अभिक्रिया का एक उदाहरण दीजिए।","a":"α-H रहित एल्डिहाइड (HCHO, C6H5CHO) सान्द्र NaOH से असमानुपातन: एक→एल्कोहॉल, दूसरा→कार्बोक्सिलेट। उदाहरण: 2HCHO+NaOH→CH3OH+HCOONa।"},{"q":"25. एस्टरीकरण अभिक्रिया लिखें।","a":"RCOOH+R'OH ⇌(सान्द्र H2SO4, गर्म)⇌ RCOOR'+H2O — प्रतिवर्ती अभिक्रिया; उत्पाद बढ़ाने हेतु एक अभिकारक आधिक्य में लें या बना जल हटाते रहें।"},{"q":"26. डाइएजोटीकरण अभिक्रिया लिखें।","a":"ArNH2+NaNO2+HCl --(0-5°C)--> ArN2+Cl-+NaCl+2H2O — प्राथमिक ऐरोमैटिक एमीन से डाइएजोनियम लवण। निम्न ताप आवश्यक — कक्ष ताप पर डाइएजोनियम अस्थायी होकर विघटित हो जाता है।"},{"q":"27. ग्लूकोस की खुली श्रृंखला संरचना बनाएँ।","a":"CHO-(CHOH)4-CH2OH (C6H12O6) — C1 पर -CHO, C2-C5 पर -OH, C6 पर -CH2OH; इसलिए ग्लूकोस एक एल्डोहेक्सोज़ है।"},{"q":"28. वसा एवं तेल में अन्तर लिखें।","a":"वसा: संतृप्त वसा अम्लों के ट्राईग्लिसराइड, कमरे के ताप पर ठोस, प्राणी स्रोत (घी, मक्खन)। तेल: असंतृप्त वसा अम्लों के ट्राईग्लिसराइड, कमरे के ताप पर द्रव, वनस्पति स्रोत (सरसों, नारियल)।"},{"q":"29. साबुन एवं अपमार्जक की क्रियाविधि समझाइए।","a":"साबुन/अपमार्जक के अणु में हाइड्रोफोबिक पूँछ (तेल में घुसती है) व हाइड्रोफिलिक सिर (जल में रहता है) होता है। ये मिसेल (micelle) बनाकर तेल/गंदगी को घेरकर जल में निलंबित (emulsify) कर देते हैं।"},{"q":"30. विटामिन A तथा C की कमी से होने वाले रोग लिखें।","a":"विटामिन A कमी: रतौंधी (night blindness) व जीरोफ्थैल्मिया (आँखों का सूखापन)। विटामिन C कमी: स्कर्वी (scurvy) — मसूड़ों से रक्तस्राव, घाव देर से भरना, जोड़ों में दर्द।"}],"BIO_S2":[{"q":"1. समसूत्री एवं अर्द्धसूत्री विभाजन में अन्तर लिखें।","a":"समसूत्री (Mitosis): 2n मातृ कोशिका से 2 संतति कोशिकाएँ (2n); कायिक वृद्धि व क्षत-मरम्मत हेतु। अर्द्धसूत्री (Meiosis): 2n मातृ से 4 संतति कोशिकाएँ (n); केवल युग्मक निर्माण हेतु — आनुवंशिक विविधता उत्पन्न करता है।"},{"q":"2. परागण की परिभाषा एवं प्रकार लिखें।","a":"परागकणों का परागकोश से वर्तिकाग्र तक स्थानांतरण। प्रकार: (1) स्वपरागण — उसी पादप के फूल पर (2) परपरागण — भिन्न पादप के फूल पर (वायु, जल, कीट, पक्षी द्वारा); परपरागण से आनुवंशिक विविधता बढ़ती है।"},{"q":"3. बीजाण्ड की संरचना का नामांकित चित्र बनाएँ।","a":"बाहरी आवरण (इंटेग्यूमेंट), भीतर न्यूसेलस ऊतक, केन्द्र में भ्रूणकोष (7-कोशिकीय, 8-केन्द्रकीय)। एक छोर पर बीजाण्डद्वार (परागनलिका प्रवेश), विपरीत छोर पर निभाग, बीजाण्डवृन्त से अंडाशय से जुड़ा।"},{"q":"4. निषेचन किसे कहते हैं? इसके प्रकार लिखें।","a":"नर युग्मक+अण्ड कोशिका→युग्मनज (2n)। प्रकार: (1) बाह्य निषेचन — शरीर के बाहर जल में (मछली, मेंढक) (2) आंतरिक निषेचन — मादा शरीर के भीतर (स्तनधारी, पुष्पी पादप)।"},{"q":"5. मानव वृषण की संरचना समझाइए।","a":"शुक्रजनक नलिकाओं की जनन उपकला से शुक्राणु निर्माण (शुक्रजनन); सरटोली कोशिकाएँ पोषण देती हैं। लेडिग (अन्तराली) कोशिकाएँ टेस्टोस्टेरोन (पुरुष लैंगिक हॉर्मोन) स्रावित करती हैं।"},{"q":"6. मानव अण्डाशय की संरचना लिखें।","a":"वल्कुट में विभिन्न परिपक्वन अवस्थाओं के पुटक (follicles), मध्यांश में रुधिर वाहिकाएँ व संयोजी ऊतक। प्रत्येक माह एक ग्राफियन पुटक परिपक्व होकर अण्डोत्सर्ग (ovulation) करता है।"},{"q":"7. आर्तव चक्र को समझाइए।","a":"लगभग 28 दिन का चक्र। (1) आर्तव चरण (1-5 दिन): एण्डोमेट्रियम टूटकर रक्तस्राव (2) पुटकीय चरण: एस्ट्रोजन से एण्डोमेट्रियम पुनर्निर्माण, ~14वें दिन अण्डोत्सर्ग (3) ल्यूटियल चरण: प्रोजेस्टेरोन प्रभाव, गर्भ न होने पर पुनः आर्तव चरण।"},{"q":"8. गर्भ निरोधक विधियों के नाम लिखें।","a":"(1) प्राकृतिक: ताल विधि, स्तनपान विधि (2) अवरोधक: कण्डोम, डायाफ्राम (3) IUD: कॉपर-T (4) हॉर्मोनल: गर्भनिरोधक गोलियाँ, इंजेक्शन (5) शल्य: पुरुष-vasectomy, महिला-tubectomy।"},{"q":"9. मेण्डल का प्रभाविता का नियम लिखें।","a":"विषमयुग्मजी (Tt) में प्रभावी एलील (T) अप्रभावी (t) को पूर्णतः दबाकर स्वयं अभिव्यक्त होता है — F1 में केवल प्रभावी लक्षण दिखता है। लंबा×बौना → सभी F1 लंबे।"},{"q":"10. मेण्डल का पृथक्करण का नियम लिखें।","a":"युग्मक निर्माण में दोनों एलील (T व t) एक-दूसरे से पृथक होकर अलग-अलग युग्मकों में जाते हैं — Tt से स्वनिषेचन → F2 में TT:Tt:tt=1:2:1 व लंबा:बौना=3:1।"},{"q":"11. सहप्रभाविता किसे कहते हैं? उदाहरण दें।","a":"दोनों एलील आंशिक रूप से अभिव्यक्त होकर मध्यवर्ती फीनोटाइप देते हैं। उदाहरण: लाल (RR)×सफेद (rr) स्नैपड्रैगन → F1 में गुलाबी (Rr) — न कोई पूर्णतः दबता है।"},{"q":"12. बहुएलीलता किसे कहते हैं? ABO रुधिर वर्ग को समझाइए।","a":"एक जीन के तीन या अधिक एलील होना। ABO रुधिर वर्ग: IA, IB, i — तीन एलील; IA व IB सहप्रभावी, दोनों i पर प्रभावी। छह जीनोटाइप → चार रुधिर वर्ग (A, B, AB, O)।"},{"q":"13. DNA एवं RNA में अन्तर लिखें।","a":"DNA: डीऑक्सीराइबोज शर्करा, थाइमिन (T) क्षारक, द्विकुण्डलीय, आनुवंशिक सूचना संग्रह। RNA: राइबोज शर्करा, यूरैसिल (U) क्षारक, एकल-कुण्डलीय, प्रोटीन संश्लेषण में मध्यस्थ।"},{"q":"14. DNA प्रतिकृति की विधि संक्षेप में लिखें।","a":"अर्द्धसंरक्षी विधि (Meselson-Stahl द्वारा सिद्ध)। हेलिकेज द्वारा दो स्ट्रैंड अलग, DNA पॉलीमरेज A-T/G-C नियम से 5'→3' दिशा में नए स्ट्रैंड बनाता है। परिणाम: 2 संतति DNA, प्रत्येक में एक पुराना+एक नया स्ट्रैंड।"},{"q":"15. अनुलेखन (Transcription) किसे कहते हैं?","a":"DNA के टेम्पलेट स्ट्रैंड से RNA पॉलीमरेज द्वारा पूरक mRNA बनाने की प्रक्रिया। केन्द्रक में होती है; यूकैरियोट में capping+splicing+tailing से परिपक्व mRNA बनता है जो राइबोसोम पर प्रोटीन संश्लेषण हेतु जाता है।"},{"q":"16. जीन अभिव्यक्ति का नियमन समझाइए।","a":"कोशिका यह नियंत्रित करती है कि कौन-सा जीन, कब, कितना अनुलेखित हो — ऊर्जा बचाने व आवश्यकतानुसार प्रोटीन बनाने हेतु। मुख्यतः अनुलेखन स्तर पर नियामक प्रोटीनों (दमनकारी/प्रेरक) द्वारा — जैसे E.coli में लैक ओपेरॉन।"},{"q":"17. जैव विकास के प्रमाणों का संक्षिप्त वर्णन करें।","a":"(1) जीवाश्म: भूगर्भीय शैल-स्तरों में क्रमिक विकास का प्रत्यक्ष प्रमाण (2) समजात अंग: समान उत्पत्ति, भिन्न कार्य (जैसे कशेरुकियों के अग्रपाद) — अपसारी विकास (3) समवृत्ति अंग: भिन्न उत्पत्ति, समान कार्य — अभिसारी विकास (4) भ्रूणिकीय समानताएँ (5) DNA/प्रोटीन अनुक्रमों में समानता।"},{"q":"18. डार्विन का प्राकृतिक चयन सिद्धान्त लिखें।","a":"(1) जीव अत्यधिक प्रजनन करते हैं, संसाधन सीमित → जीवन-संघर्ष (2) समष्टि में आनुवंशिक भिन्नताएँ (variations) होती हैं (3) वातावरण के लिए उपयुक्त भिन्नता वाले जीव जीवित रहकर संतान देते हैं ('उपयुक्ततम की उत्तरजीविता') — लाखों वर्षों में नई जातियाँ विकसित होती हैं।"},{"q":"19. पारिस्थितिक पिरामिड किसे कहते हैं?","a":"पोषी स्तरों पर संख्या/जैवभार/ऊर्जा को क्रमिक रूप से चित्रित करने पर बना आरेख। तीन प्रकार: संख्या, जैवभार, ऊर्जा का पिरामिड। ऊर्जा का पिरामिड सदैव सीधा (upright) होता है — प्रत्येक स्तर पर ऊर्जा घटती है।"},{"q":"20. खाद्य जाल को समझाइए।","a":"परस्पर जुड़ी (interconnected) खाद्य श्रृंखलाओं का जाल। एक ही जीव कई खाद्य श्रृंखलाओं में भाग लेता है। पारितंत्र को स्थिरता देता है — एक प्रजाति समाप्त होने पर भी ऊर्जा वैकल्पिक मार्ग से प्रवाहित रहती है।"},{"q":"21. जैव-विविधता की परिभाषा एवं प्रकार लिखें।","a":"किसी क्षेत्र की समस्त जीव-प्रजातियों, आनुवंशिक भिन्नताओं व पारितंत्रों की विविधता। तीन प्रकार: (1) आनुवंशिक विविधता — एक प्रजाति के व्यष्टियों में जीन भिन्नता (2) जातीय विविधता — प्रजातियों की संख्या व बहुतायत (3) पारितंत्रीय विविधता — वन, मरुस्थल, आर्द्रभूमि जैसे विभिन्न पारितंत्रों की विविधता।"},{"q":"22. जैव-प्रौद्योगिकी की परिभाषा एवं उपयोग लिखें।","a":"जीवों/उनके भागों/एंजाइमों का उपयोग कर मानव-उपयोगी उत्पाद विकसित करना। उपयोग: (1) चिकित्सा: इंसुलिन, वृद्धि हॉर्मोन, Hepatitis-B टीका (2) कृषि: Bt cotton, Golden Rice (3) पर्यावरण: बायोरेमेडिएशन (4) जीन थेरेपी: ADA जैसी कमियों में।"},{"q":"23. पुनर्योगज DNA तकनीक के चरण लिखें।","a":"(1) वांछित जीन व plasmid को एक ही restriction enzyme से काटना (sticky ends) (2) DNA ligase से जोड़कर recombinant DNA बनाना (3) transformation द्वारा E.coli में प्रविष्ट कराना (4) प्रतिजैविक प्रतिरोध मार्कर द्वारा सफल कोशिकाओं का चयन व बायोरिएक्टर में mass culturing।"},{"q":"24. प्लास्मिड किसे कहते हैं?","a":"जीवाणु का मुख्य गुणसूत्र से अलग, छोटा, वृत्ताकार, स्वतः प्रतिकृति करने वाला अतिरिक्त-गुणसूत्रीय DNA। आनुवंशिक इंजीनियरिंग में क्लोनिंग vector के रूप में उपयोगी — वांछित जीन जोड़कर पोषी में प्रविष्ट कराया जाता है।"},{"q":"25. PCR की कार्यविधि लिखें।","a":"तीन चरण (बार-बार दोहराए जाते हैं): (1) विकृतीकरण (~95°C): DNA के दो स्ट्रैंड अलग (2) प्राइमर संलयन (~50-65°C): प्राइमर पूरक अनुक्रम से जुड़ते हैं (3) विस्तारण (~72°C): Taq polymerase नए स्ट्रैंड बनाता है। 20-30 चक्रों में DNA की प्रतियाँ घातांकीय रूप से बढ़ती हैं।"},{"q":"26. प्रतिरक्षा तन्त्र की परिभाषा लिखें।","a":"शरीर की जैविक प्रणाली जो रोगजनकों (bacteria, virus आदि) व हानिकारक पदार्थों (antigens) को पहचानकर नष्ट करती है। दो प्रकार: (1) सहज (innate): जन्म से, सामान्य रूप से (2) उपार्जित (acquired): antigen संपर्क के बाद, अत्यंत विशिष्ट व स्मृति (memory) युक्त।"},{"q":"27. एण्टीबायोटिक प्रतिरोध क्या है?","a":"उत्परिवर्तन/जीन स्थानांतरण से जीवाणु में ऐसे जीन आ जाते हैं जो उसे एण्टीबायोटिक की उपस्थिति में भी जीवित रखते हैं। अत्यधिक/अनुचित/अधूरे कोर्स से प्रतिरोधी strain तेजी से बढ़ते हैं — आज यह गंभीर सार्वजनिक स्वास्थ्य समस्या है।"},{"q":"28. ऊतक संवर्धन तकनीक का सिद्धान्त लिखें।","a":"Cell Totipotency सिद्धांत पर आधारित — प्रत्येक जीवित पादप कोशिका संपूर्ण पादप बनाने में सक्षम। बंध्य परिस्थितियों में शर्करा+खनिज+विटामिन+ऑक्सिन/साइटोकाइनिन युक्त माध्यम पर कोशिकाएँ कैलस→जड़+प्ररोह→पूर्ण पादप बनाती हैं।"},{"q":"29. जैव उर्वरक एवं जैव कीटनाशकों का महत्त्व लिखें।","a":"जैव उर्वरक (Rhizobium, Azotobacter, Mycorrhiza): N2 स्थिरीकरण/पोषक तत्व उपलब्धता बढ़ाकर रासायनिक उर्वरक की जरूरत कम, मिट्टी की उर्वरता बनाए रखते हैं। जैव कीटनाशक (Bt-उत्पाद): केवल विशिष्ट हानिकारक कीटों पर प्रभावी, मनुष्य/लाभकारी जीव सुरक्षित, शीघ्र जैव-निम्नीकरणीय।"},{"q":"30. जैव आवर्धन (Biomagnification) किसे कहते हैं?","a":"अनिम्नीकरणीय रसायन (जैसे DDT) खाद्य श्रृंखला के प्रत्येक पोषी स्तर पर जीवों में संचित होकर सान्द्रता में वृद्धि — उत्पादक→शाकाहारी→मांसाहारी→शीर्ष उपभोक्ता। उदाहरण: जलीय तंत्र में पक्षियों में DDT की अत्यधिक सान्द्रता से अंडों का कवच पतला होना।"}],"HIN_S2":[{"q":"1. सूरदास के पदों का प्रतिपाद्य लिखिए।","a":"सूरदास के पदों में कृष्ण की बाल लीलाएँ और वात्सल्य भाव है।\nभाषा: ब्रजभाषा\nविशेषताएँ:\n(1) वात्सल्य और शृंगार रस\n(2) मधुर संगीतात्मकता\n(3) प्रकृति चित्रण\n(4) विरह का मार्मिक वर्णन"},{"q":"2. रस की परिभाषा एवं 9 भेद।","a":"रस: काव्य से मिलने वाला आनन्द।\n9 रस:\n1.शृंगार(रति) 2.हास्य(हास) 3.करुण(शोक)\n4.रौद्र(क्रोध) 5.वीर(उत्साह) 6.भयानक(भय)\n7.बीभत्स(जुगुप्सा) 8.अद्भुत(विस्मय) 9.शांत(निर्वेद)"},{"q":"3. अलंकार की परिभाषा उदाहरण सहित।","a":"काव्य की शोभा बढ़ाने वाले तत्त्व अलंकार हैं।\nशब्दालंकार: अनुप्रास, यमक, श्लेष\nअर्थालंकार: उपमा, रूपक, उत्प्रेक्षा\nउदा:\nअनुप्रास: 'चारु चंद्र की चंचल किरणें'\nउपमा: 'सागर सा गंभीर'"},{"q":"4. रेणु की भाषा-शैली की विशेषताएँ।","a":"(1) आंचलिक भाषा का प्रयोग\n(2) भोजपुरी, मैथिली शब्द\n(3) लोकगीतों का समावेश\n(4) जीवंत संवाद\n(5) ग्रामीण जीवन का सजीव चित्रण"},{"q":"5. प्रेमचन्द की साहित्यिक विशेषताएँ।","a":"(1) यथार्थवादी लेखन\n(2) किसान, दलित, नारी समस्या\n(3) सरल भाषा\n(4) आदर्शोन्मुखी कथाएँ\n(5) 'गोदान', 'कफन' जैसी कालजयी रचनाएँ"},{"q":"6. निबन्ध और कहानी में अन्तर।","a":"निबन्ध: विचारात्मक गद्य\nलेखक के विचार प्रधान\nकहानी: कथातत्त्व प्रधान\nपात्र, संवाद, कथावस्तु प्रधान"},{"q":"7. मुहावरे और लोकोक्ति में अन्तर।","a":"मुहावरा: वाक्यांश, विशेष अर्थ\n'आँखें चुराना' = सामने न आना\nलोकोक्ति: पूर्ण कथन, अनुभव आधारित\n'अब पछताए होत क्या...'\nमुहावरा वाक्य का अंग; लोकोक्ति स्वतंत्र।"},{"q":"8. उपसर्ग और प्रत्यय में अन्तर।","a":"उपसर्ग: शब्द के आगे\nप्र+गति=प्रगति, अ+सत्य=असत्य\nप्रत्यय: शब्द के पीछे\nमनुष्य+ता=मनुष्यता\nदोनों शब्द का अर्थ बदलते हैं।"},{"q":"9. तत्सम, तद्भव और देशज में अन्तर।","a":"तत्सम: संस्कृत से सीधे — अग्नि, क्षेत्र\nतद्भव: बदलकर — आग, खेत\nदेशज: स्थानीय — खिड़की, लोटा\nविदेशज: अन्य भाषा — कमीज, कैंची"},{"q":"10. कारक की परिभाषा और 8 कारक।","a":"संज्ञा/सर्वनाम का क्रिया से सम्बन्ध।\n8 कारक:\nकर्ता(ने), कर्म(को), करण(से)\nसम्प्रदान(के लिए), अपादान(से अलग)\nसम्बन्ध(का/के/की), अधिकरण(में/पर)\nसम्बोधन(हे!)"},{"q":"11. छायावाद की 5 प्रमुख विशेषताएँ।","a":"(1) व्यक्तिवाद\n(2) प्रकृति का मानवीकरण\n(3) प्रेम और सौंदर्य\n(4) रहस्यवाद\n(5) नई शैली\nकवि: प्रसाद, निराला, पंत, महादेवी"},{"q":"12. पत्र लेखन के दो प्रकार।","a":"(1) औपचारिक: सरकारी, व्यापारिक\nभाषा: शिष्ट, मानक\n(2) अनौपचारिक: मित्र, परिवार\nभाषा: सरल, भावनात्मक\nBSEB: प्रधानाचार्य को = औपचारिक"},{"q":"13. संक्षेपण की परिभाषा एवं नियम।","a":"(1) मूल का 1/3 भाग\n(2) मुख्य बातें\n(3) अपने शब्दों में\n(4) तृतीय पुरुष\n(5) एक अनुच्छेद\n(6) उचित शीर्षक"},{"q":"14. रामचरितमानस की भाषाई विशेषताएँ।","a":"भाषा: अवधी\nशैली: दोहा-चौपाई\n(1) तत्सम शब्द\n(2) मधुर और लयात्मक\n(3) अलंकारों का प्रयोग\n(4) भक्ति और दर्शन का समन्वय"},{"q":"15. आत्मकथा और जीवनी में अन्तर।","a":"आत्मकथा: स्वयं अपनी कथा, प्रथम पुरुष\nजीवनी: किसी अन्य की, तृतीय पुरुष\nदोनों जीवन आधारित रचनाएँ।"},{"q":"16. वाक्य शुद्धि के नियम।","a":"(1) कर्ता-क्रिया में वचन-लिंग साम्य\n(2) उचित कारक चिह्न\n(3) सही शब्द प्रयोग\nअशुद्ध: मैंने खाना खाई\nशुद्ध: मैंने खाना खाया"},{"q":"17. सूचना लेखन का प्रारूप।","a":"──────────\nसूचना\n[संस्था]\n[दिनांक]\n[शीर्षक]\n[विषय: क्या, कब, कहाँ, क्यों]\n[नाम, पद]\n──────────"},{"q":"18. निराला की कविता की विशेषताएँ।","a":"(1) मुक्त छंद के प्रवर्तक\n(2) क्रांतिकारी विचार\n(3) राष्ट्रीय चेतना\n(4) शोषित वर्ग की आवाज\n(5) 'राम की शक्तिपूजा' प्रमुख रचना"},{"q":"19. हिंदी साहित्य के काल विभाजन।","a":"आदिकाल (700-1400): चंदबरदाई\nभक्तिकाल (1400-1700): कबीर, तुलसी\nरीतिकाल (1700-1900): बिहारी\nआधुनिककाल (1900-): प्रेमचंद, निराला"},{"q":"20. 'बाजार दर्शन' का सारांश।","a":"लेखक: जैनेन्द्र कुमार\nमुख्य विचार: बाजार की शक्ति मन की कमजोरी है।\nगांधी: सच्चा सुख त्याग में।\nसंदेश: जरूरत के अनुसार खरीदें, दिखावे के लिए नहीं।"},{"q":"21. 'गोदान' उपन्यास की मुख्य थीम।","a":"किसान जीवन की त्रासदी।\nपात्र: होरी, धनिया\n(1) कर्ज का बोझ\n(2) जमींदारी शोषण\n(3) ग्रामीण-शहरी अंतर\n(4) नारी की दुर्दशा"},{"q":"22. महादेवी वर्मा की काव्य विशेषताएँ।","a":"(1) वेदना और करुणा\n(2) रहस्यवादी भावना\n(3) प्रकृति से तादात्म्य\n(4) नारी पीड़ा\n(5) संगीतात्मक भाषा\nरचनाएँ: नीहार, रश्मि, नीरजा, यामा"},{"q":"23. औपचारिक पत्र का प्रारूप।","a":"सेवा में,\nप्रधानाचार्य महोदय,\n[विद्यालय, पता]\nविषय: [कारण]\nमहोदय,\n[मुख्य बात]\nधन्यवाद।\nआपका शिष्य,\n[नाम, कक्षा, दिनांक]"},{"q":"24. संधि और समास में अन्तर।","a":"संधि: दो वर्णों का मेल\nराम+ईश्वर = रामेश्वर\nसमास: दो शब्दों का संक्षिप्त रूप\nराजपुत्र = राजा का पुत्र\nसंधि में ध्वनि परिवर्तन; समास में अर्थ संक्षेप।"},{"q":"25. हिंदी में प्रयोगवाद की विशेषताएँ।","a":"(1) नए भाषाई प्रयोग\n(2) अज्ञेय का 'तारसप्तक' (1943)\n(3) व्यक्तिवाद\n(4) आत्मसंघर्ष\n(5) यथार्थवाद"},{"q":"26. 'कफन' कहानी का सारांश।","a":"लेखक: प्रेमचंद\nपात्र: घीसू, माधव, बुधिया\nकथावस्तु: मरती पत्नी का कफन न खरीदकर शराब पीना।\nशैली: व्यंग्यात्मक यथार्थवाद"},{"q":"27. यात्रा-वृत्तान्त की विशेषताएँ।","a":"(1) स्थान का सजीव वर्णन\n(2) व्यक्तिगत अनुभव\n(3) सांस्कृतिक जानकारी\n(4) रोचक शैली\n(5) उत्सुकता जगाना"},{"q":"28. रिपोर्ताज किसे कहते हैं?","a":"किसी घटना का आँखों देखा वर्णन।\nविशेषताएँ:\n(1) तात्कालिकता\n(2) आँखों देखा विवरण\n(3) भावात्मक और तथ्यात्मक\n(4) पत्रकारिता और साहित्य का मिश्रण"},{"q":"29. जनसंचार माध्यमों के प्रकार।","a":"1. मुद्रण: समाचार पत्र, पत्रिका\n2. इलेक्ट्रॉनिक: रेडियो, TV\n3. डिजिटल: इंटरनेट, सोशल मीडिया\nसभी जन-जागृति में सहायक।"},{"q":"30. प्रयोजनमूलक हिंदी के प्रकार।","a":"(1) राजभाषा — सरकारी\n(2) व्यावसायिक — व्यापार\n(3) मीडिया — समाचार\n(4) तकनीकी — विज्ञान"}],"ENG_S2":[{"q":"1. Why did William Douglas develop fear of water? (Deep Water)","a":"As a child, a big boy threw Douglas into YMCA pool. He nearly drowned — sinking to bottom repeatedly. This traumatic experience created lifelong fear of water. He overcame it through professional swimming lessons and determination."},{"q":"2. Condition of bangle makers in Firozabad? (Lost Spring)","a":"Bangle makers worked in dark, dingy rooms near furnaces. Children worked instead of going to school. Risk of blindness due to glass dust. Trapped in debt and poverty — a vicious cycle of exploitation."},{"q":"3. Why did peddler sign as Captain von Stahle? (The Rattrap)","a":"Edla treated him with kindness, believing he was a Captain. Her goodness transformed him — he felt ashamed of theft. He returned stolen money, signing as 'Captain von Stahle' to honor her trust. Shows inner transformation through compassion."},{"q":"4. What did Gandhi do for Champaran sharecroppers? (Indigo)","a":"Gandhi organized civil disobedience. He investigated grievances, collected evidence, negotiated with British. Won 25% refund for farmers. Established schools in villages. India's first successful civil disobedience movement."},{"q":"5. Poet's mother's appearance in 'My Mother at Sixty-Six'.","a":"Mother's face: ashen like corpse, pale as late winter's moon. Mouth open, eyes closed. The familiar childhood fear of losing mother returned to the poet. Reflects aging and fear of separation."},{"q":"6. What does poet ask in 'Keeping Quiet'?","a":"Pablo Neruda asks everyone to stop all activity for one moment. Not speak any language. Not move arms so much. Purpose: create stillness and mutual understanding. Message: silence prevents war and harm."},{"q":"7. Why is a thing of beauty joy forever? (A Thing of Beauty)","a":"According to Keats, beauty never fades from memory. It removes sadness and gives hope. Examples: sun, moon, trees, flowers, rivers. Beauty uplifts the human spirit — hence 'a joy forever'."},{"q":"8. What are Aunt Jennifer's tigers doing?","a":"Tigers are prancing across embroidered screen. Bright topaz, fearless, not afraid of men. Moving with ease under trees. Symbolism: represent freedom Aunt Jennifer desires but cannot have due to oppressive marriage."},{"q":"9. Format of report writing.","a":"1. Headline — catchy\n2. Byline — By [Reporter]\n3. Place, Date\n4. Opening — 5W1H\n5. Body — details\n6. Conclusion\nLanguage: Third person, Past tense, Factual"},{"q":"10. Theme of 'The Third Level'.","a":"Theme: Escape from stress. Third level represents wish to return to simpler past (1894). Charley uses imagination as escape. Story explores thin line between reality and fantasy."},{"q":"11. Change voice: 'The boy is flying a kite.'","a":"Active: The boy is flying a kite.\nPassive: A kite is being flown by the boy.\nFormula: Object + is/am/are + being + V3 + by + Subject"},{"q":"12. Write letter to editor about stray dogs.","a":"To,\nThe Editor,\n[Newspaper]\nSir,\nI wish to draw attention to menace of stray dogs. Several people bitten recently.\nI urge municipal authorities for immediate action.\nYours faithfully,\n[Name]"},{"q":"13. Explain: 'Actions speak louder than words.'","a":"Meaning: What we do is more important than what we say.\nAnyone can make promises. True character shown by actions. A helpful deed is better than kind words."},{"q":"14. Types of sentences with examples.","a":"Simple: She sings.\nCompound: She sings and dances.\nComplex: She sings because she is happy.\nDeclarative, Interrogative, Imperative, Exclamatory."},{"q":"15. Conditional sentences with types.","a":"Type 0: If you heat ice, it melts.\nType 1: If it rains, I will stay.\nType 2: If I were rich, I would help.\nType 3: If I had studied, I would have passed."},{"q":"16. What is Precis Writing?","a":"Summary in 1/3 length. Read twice, identify main ideas, write in own words, third person, give title. No direct speech."},{"q":"17. Use of Modals.","a":"Can: ability, Could: past ability\nMay: permission, Might: possibility\nMust: obligation, Should: advice\nWould: conditional, Shall: formal future"},{"q":"18. Character of rattrap peddler.","a":"Poor, homeless, philosophical (sees world as rattrap). Initially dishonest — steals from crofter. Transformed by Edla's kindness. Returns money, signs as Captain. Theme: goodness transforms people."},{"q":"19. Draft notice for blood donation camp.","a":"NOTICE\nXYZ School | [Date]\nBLOOD DONATION CAMP\nAll students above 18 invited. Date: [date], School Hall, 10AM-2PM.\n[Name]\nHead Boy/Girl"},{"q":"20. Message of 'The Last Lesson'.","a":"Never take language and culture for granted. M. Hamel shows value of mother tongue. Patriotism and cultural pride. 'Language is the key to prison of enslaved people.'"},{"q":"21. 'The Road Not Taken' by Robert Frost.","a":"Theme: Individual choices in life. Speaker chooses less-traveled road. Symbolism: roads = life choices. Message: our choices define future. Have courage to be different."},{"q":"22. Gerunds and Infinitives.","a":"Gerund (V+ing): Swimming is healthy. I enjoy reading.\nInfinitive (to+V1): I go to study. Happy to help.\nVerbs+gerund: enjoy, avoid. Verbs+infinitive: want, decide."},{"q":"23. Degrees of Comparison.","a":"Positive: tall. Comparative: taller. Superlative: tallest.\nIrregular: good-better-best, bad-worse-worst.\n1 syllable: -er/-est. 2+ syllables: more/most."},{"q":"24. Write formal email format.","a":"To: [email]\nSubject: [specific]\nDear Sir/Madam,\nI am writing to [purpose].\n[Content]\nYours sincerely,\n[Name, Designation]"},{"q":"25. Stream of consciousness.","a":"Literary technique depicting continuous flow of thoughts. Features: inner monologue, non-linear, psychological realism. Authors: Virginia Woolf (Mrs. Dalloway), James Joyce (Ulysses)."},{"q":"26. Subject-Verb Agreement.","a":"Singular subject → singular verb: The dog barks.\nPlural → plural: The dogs bark.\nCollective: usually singular. Either/Neither: singular.\nNews/Furniture: singular."},{"q":"27. Direct and Indirect Speech.","a":"Direct: He said, 'I am happy.'\nIndirect: He said that he was happy.\nRules: Remove quotes, add 'that', change pronouns and tenses."},{"q":"28. Character of Dr. Sadao in 'The Enemy'.","a":"Dedicated doctor, patriotic but humane. Saves American soldier despite risk. Conflict: duty vs medical oath. Message: humanity transcends nationalism."},{"q":"29. Speech on 'Clean India, Green India'.","a":"Respected audience,\nSwachh Bharat Abhiyan launched 2014. Actions: avoid plastic, plant trees, proper waste disposal. Gandhi: 'Cleanliness is next to Godliness.' Let us make India clean and green!\nThank you!"},{"q":"30. Active and Passive Voice rules.","a":"Active: Subject does action — She writes.\nPassive: Object becomes subject — A letter is written.\nFormulas:\nSimple Present: is/am/are + V3\nSimple Past: was/were + V3\nFuture: will + be + V3"}],"MAT_S2":[{"q":"1. एकैकी एवं आच्छादक फलनों में अन्तर।","a":"एकैकी: f(x₁)=f(x₂) → x₁=x₂\nआच्छादक: codomain का हर element image है\nBijective = दोनों\nउदा: f(x)=2x+1 bijective है R→R पर"},{"q":"2. आव्यूह A=[[2,3],[1,2]] का व्युत्क्रम।","a":"|A|=2×2-3×1=1\nadj(A)=[[2,-3],[-1,2]]\nA⁻¹=[[2,-3],[-1,2]]\nजाँच: A·A⁻¹=I ✓"},{"q":"3. गुणनफल नियम सिद्ध कीजिए।","a":"d/dx[fg]=f'g+fg'\nसिद्धान्त: lim से\n= f(x)g'(x)+g(x)f'(x)\nउदा: d/dx[x²sinx]=2x sinx+x²cosx"},{"q":"4. f(x)=x³-3x के चरम बिन्दु।","a":"f'(x)=3x²-3=3(x-1)(x+1)\nx=1,-1\nf''(1)=6>0 → निम्नतम, f(1)=-2\nf''(-1)=-6<0 → उच्चतम, f(-1)=2"},{"q":"5. ∫x sinx dx का मान।","a":"u=x, v=sinx\n∫x sinx dx = x(-cosx)-∫(-cosx)dx\n=-x cosx + sinx + C"},{"q":"6. रोले एवं मध्यमान प्रमेय।","a":"रोले: f(a)=f(b) → ∃c: f'(c)=0\nMVT: ∃c: f'(c)=[f(b)-f(a)]/(b-a)\nज्यामितीय: जीवा का ढाल = स्पर्श रेखा का ढाल"},{"q":"7. सारणिक के गुणधर्म।","a":"(1)|Aᵀ|=|A| (2)समान पंक्ति→0\n(3)k गुणा→k|A| (4)पंक्ति बदलने पर चिह्न\n(5)|AB|=|A||B| (6)पंक्ति जोड़→|A| same"},{"q":"8. प्रायिकता का योग प्रमेय।","a":"P(A∪B)=P(A)+P(B)-P(A∩B)\nपरस्पर अपवर्जी: P(A∩B)=0\nउदा: 0.3+0.4-0.1=0.6"},{"q":"9. ∫₁² x dx =","a":"[x²/2]₁² = 4/2-1/2 = 3/2 = 1.5"},{"q":"10. बेज प्रमेय।","a":"P(Aᵢ|B)=P(Aᵢ)·P(B|Aᵢ)/Σ P(Aⱼ)·P(B|Aⱼ)\nउदा: Box I: 3R,4W; Box II: 4R,3W\nP(I|R)=(1/2×3/7)/(1/2×3/7+1/2×4/7)=3/7"},{"q":"11. LPP के घटक और विधि।","a":"घटक: चर, उद्देश्य फलन Z=ax+by, अवरोध, x,y≥0\nविधि: सुसंगत क्षेत्र → कोने के बिंदु → Z का मान → इष्टतम"},{"q":"12. ∫eˣ sinx dx =","a":"I = eˣsinx - ∫eˣcosx dx\n= eˣsinx - eˣcosx - I\n2I = eˣ(sinx-cosx)\nI = eˣ(sinx-cosx)/2 + C"},{"q":"13. अवकल समीकरण का क्रम और घात।","a":"क्रम: उच्चतम अवकलज का क्रम\nघात: उच्चतम अवकलज की घात\ndy/dx=y → क्रम=1, घात=1, हल: y=Ceˣ"},{"q":"14. स्थिति सदिश और एकांक सदिश।","a":"स्थिति सदिश: →OP=xî+yĵ+zk̂, |OP|=√(x²+y²+z²)\nएकांक सदिश: â=→a/|→a|, परिमाण=1\nî,ĵ,k̂ एकांक सदिश"},{"q":"15. क्रमचय और संचय में अंतर।","a":"क्रमचय nPr: क्रम मायने, n!/(n-r)!\nसंचय nCr: क्रम नहीं, n!/[r!(n-r)!]\nnPr = r! × nCr\nउदा: 5P3=60, 5C3=10"},{"q":"16. द्वितीय अवकलज परीक्षण।","a":"f'(x)=0 → क्रांतिक बिंदु c\nf''(c)>0 → निम्नतम\nf''(c)<0 → उच्चतम\nf''(c)=0 → अनिर्णायक"},{"q":"17. निश्चित समाकलन के गुणधर्म।","a":"(1)∫ₐᵇ=-∫ᵦᵃ (2)∫ₐᵃ=0\n(3)∫ₐᵇ=∫ₐᶜ+∫ᶜᵇ\n(4)∫ₐᵇf(x)=∫ₐᵇf(a+b-x)\n(5)सम फलन: ∫₋ₐᵃ=2∫₀ᵃ"},{"q":"18. समतल का समीकरण।","a":"सामान्य: ax+by+cz+d=0\nसदिश: →r·→n=d\nअन्तःखण्ड: x/a+y/b+z/c=1\nदूरी: |ax₁+by₁+cz₁+d|/√(a²+b²+c²)"},{"q":"19. द्विपद बंटन।","a":"P(X=r)=nCr·pʳ·(1-p)^(n-r)\nमाध्य=np\nप्रसरण=npq\nउदा: n=10,p=0.5 → μ=5, σ²=2.5"},{"q":"20. वर्धमान और ह्रासमान फलन।","a":"वर्धमान: f'(x)>0\nह्रासमान: f'(x)<0\nf(x)=x²: x>0 पर वर्धमान, x<0 पर ह्रासमान"},{"q":"21. प्रथम कोटि रैखिक अवकल समीकरण।","a":"dy/dx+Py=Q\nIF=e^∫P dx\nd/dx[y·IF]=Q·IF\ny·IF=∫Q·IF dx+C\nउदा: dy/dx+y=eˣ → IF=eˣ → y=eˣ/2+Ce⁻ˣ"},{"q":"22. सप्रतिबंध प्रायिकता।","a":"P(A|B)=P(A∩B)/P(B)\nगुणन: P(A∩B)=P(B)·P(A|B)\nस्वतंत्र: P(A|B)=P(A)\nP(A∩B)=P(A)·P(B)"},{"q":"23. x^x का अवकलन।","a":"y=x^x → log y=x log x\n(1/y)dy/dx=1+log x\ndy/dx=x^x(1+log x)"},{"q":"24. दो रेखाओं में न्यूनतम दूरी।","a":"समान्तर: d=|(→a₂-→a₁)×→b|/|→b|\nविकर्ण: d=|(→a₂-→a₁)·(→b₁×→b₂)|/|→b₁×→b₂|"},{"q":"25. क्रेमर नियम।","a":"D=|A|, D₁,D₂ = आव्यूह\nx=D₁/D, y=D₂/D (D≠0)\nD=0,D₁=D₂=0 → अनंत हल\nD=0, कोई Dᵢ≠0 → हल नहीं"},{"q":"26. समाकलन से क्षेत्रफल: y=x², 0 से 3।","a":"A=∫₀³x² dx=[x³/3]₀³=27/3=9 वर्ग इकाई\nसूत्र: A=|∫ₐᵇf(x)dx|"},{"q":"27. तुल्यता संबंध।","a":"तुल्यता: स्वतुल्य+सममित+संक्रामक\nउदा: 'समान आयु' — तीनों शर्तें ✓"},{"q":"28. मानक विचलन।","a":"σ=√[Σ(xᵢ-x̄)²/n]\nप्रसरण=σ²\nउदा: 2,4,6 → x̄=4, σ²=8/3"},{"q":"29. sin⁻¹x+cos⁻¹x=π/2 सिद्ध।","a":"sin⁻¹x=θ → x=sinθ\ncos⁻¹x=π/2-θ (क्योंकि sin(π/2-θ)=x)\n∴ sin⁻¹x+cos⁻¹x=θ+(π/2-θ)=π/2 ✓"},{"q":"30. रेखा का सदिश और कार्तीय समीकरण।","a":"बिंदु(x₁,y₁,z₁), दिशा(a,b,c):\nसदिश: →r=→a+λ→b\nकार्तीय: (x-x₁)/a=(y-y₁)/b=(z-z₁)/c"}],"PHY_S5":[{"q":"1. गॉस के नियम का उपयोग कर अनन्त लम्बाई के सीधे आवेशित तार के कारण विद्युत क्षेत्र का व्यंजक प्राप्त करें।","a":"गॉस का नियम: ∮E·dA = q/ε₀। तार के चारों ओर r अर्धव्यास, l लंबाई का बेलनाकार गाउसीय पृष्ठ लें। सिरों से फ्लक्स शून्य (E ⊥ अक्ष), वक्र पृष्ठ से फ्लक्स = E×2πrl। संलग्न आवेश = λl (λ=रेखीय आवेश घनत्व)।\n∴ E×2πrl = λl/ε₀\n⇒ E = λ/(2πε₀r)\nदिशा: तार से अभिलंबवत् बाहर की ओर (धन आवेश हेतु)।"},{"q":"2. समान्तर प्लेट संधारित्र की धारिता का सूत्र प्राप्त करें। सिद्ध करें कि आवेशित संधारित्र में संचित ऊर्जा = ½CV² होती है।","a":"माना समान्तर प्लेटें, क्षेत्रफल A, दूरी d, आवेश ±Q, σ=Q/A।\nप्रत्येक प्लेट का क्षेत्र = σ/2ε₀; प्लेटों के बीच परिणामी E = σ/ε₀ = Q/(Aε₀)\nविभवांतर V = E×d = Qd/(Aε₀)\nधारिता C = Q/V = ε₀A/d\nऊर्जा: dW=V dq=(q/C)dq\nW = ∫₀^Q (q/C)dq = Q²/2C = ½CV² (∵Q=CV)\n∴ U = ½CV² = ½QV = Q²/2C"},{"q":"3. किरचॉफ के नियमों की सहायता से हीटस्टोन सेतु का सिद्धान्त स्थापित करें।","a":"व्हीटस्टोन सेतु में P,Q,R,S चतुर्भुज ABCD की भुजाओं में, बैटरी AC के बीच, धारामापी BD के बीच।\nसंतुलन पर Ig=0 ⇒ I1=I3, I2=I4\nKVL लूप ABDA: I1P=I2R\nKVL लूप BCDB: I1Q=I2S\nभाग देने पर: P/Q = R/S — यही संतुलन शर्त है।\nइसी सिद्धान्त पर मीटर सेतु कार्य करता है, अज्ञात प्रतिरोध ज्ञात करने हेतु प्रयुक्त।"},{"q":"4. बायो-सेवार्ट नियम का उपयोग कर धारावाही वृत्ताकार पाश के अक्ष पर चुम्बकीय क्षेत्र का व्यंजक प्राप्त करें।","a":"त्रिज्या R के पाश में धारा I, अक्ष पर केन्द्र से x दूरी पर बिन्दु P। r²=R²+x², θ=90°।\nबायो-सेवार्ट: dB=(μ₀/4π)(I dl sinθ)/r²\nलंबवत् घटक सममिति से रद्द, अक्षीय घटक dB cosα बचता है, cosα=R/r\nB=∫dB cosα=(μ₀I/4πr²)(R/r)(2πR)\n⇒ B = μ₀IR²/[2(R²+x²)^(3/2)]\nकेन्द्र पर (x=0): B=μ₀I/2R"},{"q":"5. प्रत्यावर्ती धारा परिपथ में श्रेणीक्रम L-C-R परिपथ के लिए प्रतिबाधा एवं शक्ति गुणांक का व्यंजक ज्ञात करें।","a":"LCR श्रेणी परिपथ: VR=IR (कला में), VL=IXL (90° आगे), VC=IXC (90° पीछे)।\nफेजर से V=I√[R²+(XL-XC)²]\n∴ Z=V/I=√[R²+(XL-XC)²], XL=ωL, XC=1/ωC\ntanφ=(XL-XC)/R\ncosφ=R/Z (शक्ति गुणांक)\nP=VrmsIrmscosφ\nअनुनाद पर XL=XC ⇒ Z=R (न्यूनतम), धारा अधिकतम, cosφ=1"},{"q":"6. ट्रांसफार्मर की संरचना, कार्यविधि एवं सिद्धान्त का विस्तृत वर्णन करें।","a":"सिद्धान्त: परस्पर प्रेरण — प्राथमिक में परिवर्ती धारा से परिवर्ती फ्लक्स द्वितीयक में emf प्रेरित करता है।\nसंरचना: लैमिनेटेड लोह कोर पर प्राथमिक (Np फेरे) व द्वितीयक (Ns फेरे) कुंडलियाँ।\nVp=Np(dΦ/dt), Vs=Ns(dΦ/dt) ⇒ Vs/Vp=Ns/Np (परिणमन अनुपात)\nआदर्श स्थिति: VpIp=VsIs\nप्रकार: स्टेप-अप (Ns>Np), स्टेप-डाउन (Ns<Np)\nहानियाँ: ताम्र हानि (I²R), लोह हानि (हिस्टैरिसिस+भँवर धारा)"},{"q":"7. प्रकाश के व्यतिकरण के लिए आवश्यक शर्तें लिखते हुए यंग के द्विझिरी प्रयोग में फ्रिंज चौड़ाई का सूत्र प्राप्त करें।","a":"व्यतिकरण की शर्तें:\n(1) स्रोत कलासंगत हों\n(2) आवृत्ति समान हो\n(3) स्रोत संकीर्ण व पास-पास हों\n(4) आयाम लगभग समान हों\nयंग प्रयोग: दो झिरी (दूरी d), पर्दा D दूरी पर। बिन्दु P पर पथान्तर Δ=dy/D\nउच्चिष्ठ: pathantar=nλ ⇒ y_n=nλD/d\nफ्रिंज चौड़ाई β=y_(n+1)-y_n=λD/d\nβ, λ व D के अनुक्रमानुपाती तथा d के व्युत्क्रमानुपाती है।"},{"q":"8. सरल सूक्ष्मदर्शी एवं संयुक्त सूक्ष्मदर्शी की संरचना, कार्यविधि एवं आवर्धन क्षमता का सूत्र प्राप्त करें।","a":"सरल सूक्ष्मदर्शी: एक उत्तल लेंस, वस्तु फोकस के भीतर — आभासी, सीधा, आवर्धित प्रतिबिम्ब।\nm=1+D/f (निकट बिन्दु पर प्रतिबिम्ब, D=25cm); अनंत पर m=D/f\nसंयुक्त सूक्ष्मदर्शी: अभिदृश्यक (f0, छोटी) व नेत्रिका (fe)। वस्तु अभिदृश्यक के फोकस के निकट — वास्तविक, आवर्धित, उल्टा प्रतिबिम्ब बनता है जो नेत्रिका के फोकस के भीतर पड़ता है, नेत्रिका इसका आवर्धित आभासी प्रतिबिम्ब बनाती है।\nm=m0×me=(L/f0)×(1+D/fe), L=नलिका लंबाई"},{"q":"9. प्रकाश विद्युत प्रभाव के आधार पर आइंस्टीन का प्रकाश विद्युत समीकरण प्राप्त करें एवं प्रायोगिक निष्कर्षों की व्याख्या करें।","a":"प्रायोगिक निष्कर्ष:\n(1) उत्सर्जन तत्क्षण\n(2) अधिकतम KE तीव्रता पर निर्भर नहीं, केवल आवृत्ति पर\n(3) देहली आवृत्ति ν₀ से कम पर उत्सर्जन नहीं\n(4) प्रकाशधारा ∝ तीव्रता\nआइंस्टीन: प्रकाश=फोटॉन(hν)। ऊर्जा संरक्षण: hν=φ₀+KEmax\nφ₀=hν₀ (कार्य फलन)\n∴ KEmax=h(ν-ν₀)\nनिरोधी विभव: eV₀=KEmax ⇒ V₀=(h/e)(ν-ν₀)\nये सभी प्रेक्षण विकिरण के कण-स्वरूप को सिद्ध करते हैं।"},{"q":"10. P-N सन्धि डायोड की कार्यप्रणाली का विस्तृत वर्णन करते हुए अर्द्ध तरंग दिष्टकारी का परिपथ चित्र बनाकर समझाइए।","a":"P-N सन्धि: P (अधिक होल) व N (अधिक e⁻) के संगम पर अवक्षय परत व स्पर्श विभव (~0.7V Si) बनता है।\nअग्र अभिनति: P→+, N→− ; अवक्षय परत संकरी, बहुसंख्यक वाहक प्रवाहित, धारा (mA)।\nउत्क्रम अभिनति: P→−, N→+ ; अवक्षय परत चौड़ी, नगण्य धारा (μA)।\nअर्द्ध तरंग दिष्टकारी: AC स्रोत—ट्रांसफार्मर द्वितीयक—डायोड D (श्रेणी)—RL।\nधनात्मक अर्द्धचक्र में D अग्र अभिनति में चालू (RL में धारा); ऋणात्मक अर्द्धचक्र में D उत्क्रम (कट-ऑफ, धारा शून्य)।\nपरिणाम: केवल आधे चक्र में स्पंदित (pulsating) DC आउटपुट।"},{"q":"11. दो समान्तर धारावाही चालकों के बीच बल का सूत्र प्राप्त करें एवं एक एम्पियर की परिभाषा दें।","a":"दो समान्तर चालक 1,2 (धाराएँ I1,I2, दूरी d)।\nचालक1 के कारण चालक2 पर क्षेत्र B1=μ₀I1/(2πd)\nचालक2 की प्रति लंबाई बल f=B1I2=μ₀I1I2/(2πd)\nसमान दिशा धाराओं में आकर्षण, विपरीत में प्रतिकर्षण (दिशा फ्लेमिंग वाम हस्त नियम से)।\n1 एम्पियर की परिभाषा: I1=I2=1A, d=1m रखने पर प्रति मीटर बल f=2×10⁻⁷N हो, तो वह धारा 1A कहलाती है।"},{"q":"12. समतल अपवर्तक पृष्ठ पर अपवर्तन का सूत्र स्थापित करें एवं वास्तविक तथा आभासी गहराई में सम्बन्ध ज्ञात करें।","a":"समतल अपवर्तक पृष्ठ पर: छोटे कोणों हेतु स्नेल नियम n1sinθ1=n2sinθ2 ≈ n1θ1=n2θ2\nसम्बन्ध: n2/v - n1/u = (n2-n1)/R, समतल पृष्ठ (R=∞) हेतु n2/v=n1/u ⇒ v=(n2/n1)u\nवास्तविक व आभासी गहराई: सघन माध्यम (n) में वस्तु, वायु में प्रेक्षक —\nआभासी गहराई = वास्तविक गहराई / n\nअर्थात μ = वास्तविक गहराई / आभासी गहराई\nइसी कारण पानी में डूबी वस्तु वास्तविक से कम गहराई पर दिखती है।"},{"q":"13. नाभिकीय विखण्डन एवं संलयन में अन्तर स्पष्ट करते हुए नाभिकीय रिएक्टर का सिद्धान्त समझाइए।","a":"नाभिकीय विखण्डन: भारी नाभिक (U-235) पर मंद न्यूट्रॉन की टक्कर से दो हल्के नाभिकों में टूटना, 2-3 न्यूट्रॉन + ~200MeV ऊर्जा मुक्त — श्रृंखला अभिक्रिया का आधार।\nनाभिकीय संलयन: हल्के नाभिक उच्च ताप-दाब पर मिलकर भारी नाभिक बनाते हैं (सूर्य में), ~10⁷K ताप आवश्यक।\nनाभिकीय रिएक्टर के भाग:\n(1) ईंधन (U-235/Pu-239)\n(2) मंदक (भारी जल/ग्रेफाइट) — न्यूट्रॉन गति कम करना\n(3) नियंत्रक छड़ें (Cd/Boron) — न्यूट्रॉन अवशोषित कर श्रृंखला अभिक्रिया नियंत्रित\n(4) शीतलक — ऊष्मा बाहर ले जाकर टर्बाइन से विद्युत उत्पादन"},{"q":"14. द्रव्यमान क्षति तथा बन्धन ऊर्जा के आधार पर नाभिक के स्थायित्व की व्याख्या कीजिए।","a":"द्रव्यमान क्षति: Δm=[Zmp+(A-Z)mn]-M(नाभिक)\nबन्धन ऊर्जा: BE=Δm×c² (आइंस्टीन सम्बन्ध E=mc² से)\nप्रति न्यूक्लिऑन BE/A नाभिक के स्थायित्व का माप है —\n• मध्यम द्रव्यमान (A≈56, Fe) में BE/A अधिकतम (~8.8MeV) — सबसे स्थायी\n• बहुत हल्के/भारी नाभिकों में BE/A कम — कम स्थायी\nइसीलिए भारी नाभिक विखण्डन से व हल्के नाभिक संलयन से अधिक स्थायी (अधिक BE/A) नाभिकों में बदलकर ऊर्जा मुक्त करते हैं।"},{"q":"15. एक P-N सन्धि का अग्र एवं उत्क्रम अभिनति में व्यवहार समझाइए तथा धारा-वोल्टता अभिलक्षण खींचिए।","a":"अग्र अभिनति: P→+, N→− ; बाह्य क्षेत्र संधि-क्षेत्र के विपरीत, अवक्षय परत संकरी होती है। देहली विभव (~0.7V Si, ~0.3V Ge) के बाद धारा घातांकीय रूप से बढ़ती है।\nउत्क्रम अभिनति: P→−, N→+ ; अवक्षय परत चौड़ी, धारा अल्पसंख्यक वाहकों से (μA) नियत (संतृप्ति), भंजन वोल्टता पर अचानक तीव्र वृद्धि।\nI-V अभिलक्षण: प्रथम चतुर्थांश में अग्र वक्र (देहली के बाद घातांकीय वृद्धि); तृतीय चतुर्थांश में उत्क्रम वक्र (लगभग शून्य, भंजन पर तीव्र वृद्धि)। यह डायोड के एकदिश (rectifying) गुण को दर्शाता है।"}],"CHE_S5":[{"q":"1. मोलरता, मोललता, नॉर्मलता एवं मोल-अंश को परिभाषित करते हुए इनमें पारस्परिक सम्बन्ध स्थापित करें।","a":"मोलरता (M)=मोल/आयतन(L)\nमोललता (m)=मोल/द्रव्यमान विलायक(kg)\nनॉर्मलता (N)=तुल्यांक/आयतन(L); N=M×संयोजकता गुणांक\nमोल-अंश xA=nA/(nA+nB)\nसम्बन्ध: मोललता ताप-स्वतंत्र, मोलरता आयतन (ताप) पर निर्भर बदलती है। तनु जलीय विलयन (घनत्व≈1g/mL) में M≈m। N=nM।"},{"q":"2. वैद्युत रसायन सेलों का विस्तृत वर्णन करते हुए नेर्न्स्ट समीकरण प्राप्त करें।","a":"वैद्युत रासायनिक सेल: एनोड (ऑक्सीकरण) व कैथोड (अपचयन) अर्ध-सेल, लवण सेतु से जुड़े। Ecell=Ecathode-Eanode\nनेर्न्स्ट समीकरण: ΔG=ΔG°+RT lnQ, ΔG=-nFEcell, ΔG°=-nFE°cell\n⇒ Ecell=E°cell-(RT/nF)lnQ\n298K, log में: Ecell=E°cell-(0.0592/n)logQ\nसंतुलन (Ecell=0) पर E°cell=(0.0592/n)logKc"},{"q":"3. अभिक्रिया की कोटि ज्ञात करने की विधियों का विस्तृत वर्णन करें।","a":"कोटि ज्ञात करने की विधियाँ:\n(1) समाकलन विधि: शून्य कोटि [A]=[A]₀-kt; प्रथम कोटि k=(2.303/t)log([A]₀/[A]) — k की स्थिरता जाँचना\n(2) अर्द्ध-आयु विधि: t1/2∝[A]₀^(1-n), विभिन्न प्रारंभिक सान्द्रता पर t1/2 मापना\n(3) आरेखीय/वान्ट हॉफ विभेदक विधि: log(वेग) vs log[सान्द्रता] का ढाल = कोटि\n(4) ओस्टवाल्ड पृथक्करण विधि: एक अभिकारक आधिक्य में रखकर बाकी की कोटि ज्ञात करना, फिर योग कुल कोटि देता है"},{"q":"4. संक्रमण तत्त्वों के सामान्य गुणधर्मों का विस्तृत वर्णन करें।","a":"संक्रमण तत्त्वों के गुण:\n(1) विन्यास (n-1)d¹⁻¹⁰ns⁰⁻²\n(2) धात्विक, उच्च गलनांक/क्वथनांक\n(3) परिवर्ती ऑक्सीकरण अवस्थाएँ\n(4) रंगीन आयन (d-d संक्रमण)\n(5) उत्प्रेरकीय गुण (परिवर्ती अवस्था+अधिशोषण)\n(6) अनुचुम्बकत्व (अयुगलित d-e⁻)\n(7) संकुल बनाने की प्रवृत्ति\n(8) मिश्रातु बनाने की क्षमता"},{"q":"5. लैन्थेनाइड श्रेणी के तत्त्वों के रसायन का विस्तृत वर्णन करें।","a":"लैन्थेनाइड (57La-71Lu, 4f श्रेणी):\n(1) विन्यास [Xe]4f¹⁻¹⁴5d⁰⁻¹6s²\n(2) मुख्य ऑक्सीकरण अवस्था +3 (कुछ +2/+4)\n(3) लैन्थेनाइड संकुचन: 4f e⁻ के दुर्बल परिरक्षण से आकार में क्रमिक कमी — इससे द्वितीय व तृतीय श्रेणी तत्वों के आकार लगभग समान (Zr~Hf)\n(4) f-f संक्रमण से रंगीन आयन\n(5) अधिकांश अनुचुम्बकीय\n(6) अभिक्रियाशील धातु, M2O3 ऑक्साइड\nउपयोग: मिश्रमेटल, उत्प्रेरक, फॉस्फोर"},{"q":"6. संयोजकता आबन्ध सिद्धान्त (VBT) के आधार पर संकुल यौगिकों में आबन्धन का विस्तृत वर्णन करें।","a":"VBT: धातु आयन उपयुक्त संकरित कक्षक देता है, लिगैण्ड एकाकी e⁻ युग्म दान करते हैं (उपसहसंयोजक आबंध)।\nsp³: चतुष्फलकीय (जैसे [NiCl4]²⁻)\ndsp²: वर्ग समतलीय (जैसे [Ni(CN)4]²⁻)\nsp³d²: अष्टफलकीय उच्च चक्रण (जैसे [FeF6]³⁻)\nd²sp³: अष्टफलकीय निम्न चक्रण (जैसे [Fe(CN)6]³⁻)\nप्रबल लिगैण्ड (CN⁻,CO) e⁻ युग्मित कराकर निम्न चक्रण देते हैं; दुर्बल (F⁻,H2O) उच्च चक्रण। सीमा: रंग/बंध-शक्ति क्रम पूर्णतः नहीं समझा पाता — इसके लिए CFT उपयुक्त।"},{"q":"7. प्रेरक प्रभाव, अनुनाद प्रभाव एवं अतिसंयुग्मन प्रभाव का विस्तृत वर्णन करें।","a":"प्रेरक प्रभाव (I): σ-बंध में e⁻ घनत्व का स्थायी विस्थापन, विद्युत-ऋणात्मकता आधारित। +I (alkyl) इलेक्ट्रॉन दान, -I (हैलोजन,NO2) आकर्षण; दूरी से घटता है।\nअनुनाद प्रभाव (R): π-e⁻/एकाकी युग्मों का संयुग्मित निकाय में विस्थानीकरण — अणु अनुनाद संरचनाओं का योगज। +M (दान, -NH2,-OH), -M (आकर्षण, -NO2,-CHO); स्थायित्व/अम्लीयता प्रभावित करता है।\nअतिसंयुग्मन: C-H σ-बंध का रिक्त/आंशिक-रिक्त p-कक्षक या π-निकाय से अतिव्यापन — कार्बोकैटायन/एल्कीन स्थायित्व क्रम 3°>2°>1° (अधिक α-H = अधिक स्थायित्व)।"},{"q":"8. एल्कोहॉल बनाने की विधियों एवं रासायनिक गुणों का विस्तृत वर्णन करें।","a":"बनाने की विधियाँ:\n(1) एल्कीन का जलयोजन (H2SO4, मार्कोनीकोव)\n(2) हाइड्रोबोरेशन-ऑक्सीकरण (anti-Markovnikov)\n(3) ऐल्डिहाइड/कीटोन का अपचयन (NaBH4/LiAlH4)\n(4) ग्रिग्नार्ड अभिक्रिया (RMgX+HCHO/RCHO/R2CO)\n(5) हैलोएल्केन का जल-अपघटन\nरासायनिक गुण:\n• ऑक्सीकरण: 1°→एल्डिहाइड→अम्ल; 2°→कीटोन; 3° कठिनता से\n• निर्जलीकरण: सान्द्र H2SO4 से एल्कीन\n• एस्टरीकरण: अम्ल से एस्टर\n• Na से H2+एल्कॉक्साइड\n• लूकास परीक्षण: 1°,2°,3° में विभेद (3° तुरंत मटमैला)"},{"q":"9. एल्डिहाइड एवं कीटोन के रासायनिक गुणों का विस्तृत वर्णन करें।","a":"रासायनिक गुण:\n(1) न्यूक्लियोफिलिक योग: HCN, NaHSO3, ग्रिग्नार्ड आदि का कार्बोनिल कार्बन पर योग\n(2) ऑक्सीकरण: एल्डिहाइड आसानी से अम्ल में (Tollens/Fehling से पहचान), कीटोन कठिनता से\n(3) अपचयन: NaBH4/LiAlH4 से एल्कोहॉल; Clemmensen/Wolff-Kishner से हाइड्रोकार्बन\n(4) एल्डोल संघनन: α-H युक्त यौगिक तनु क्षार से एल्डोल→निर्जलीकरण से α,β-असंतृप्त यौगिक\n(5) कैनिज़ारो: α-H रहित (HCHO,C6H5CHO) सान्द्र क्षार से असमानुपातन → एल्कोहॉल+अम्ल\n(6) हेलोफॉर्म: मेथिल कीटोन/CH3CHO+NaOX→ट्राईहैलोमेथेन\nपहचान: Tollens(Ag मिरर), Fehling(ईंट-लाल Cu2O) केवल एल्डिहाइड से धनात्मक"},{"q":"10. एमीन के रासायनिक गुणों एवं पृथक्करण की विधियों का विस्तृत वर्णन करें।","a":"रासायनिक गुण:\n(1) क्षारकता: एकाकी e⁻ युग्म से क्षारीय; जलीय क्रम 2°>1°>3°\n(2) एसिलीकरण: ऐसिल हैलाइड/एनहाइड्राइड से एमाइड\n(3) कार्बिलएमीन परीक्षण: 1° एमीन+CHCl3+KOH→R-NC (दुर्गन्ध) — 1° पहचान\n(4) डाइएज़ोटीकरण: 1° ऐरोमैटिक एमीन+NaNO2/HCl(0-5°C)→डाइएज़ोनियम लवण\n(5) हिन्ज़बर्ग परीक्षण: 1°,2°,3° एमीन में विभेद\nपृथक्करण विधियाँ:\n(1) Hoffmann ब्रोमामाइड: एमाइड+Br2/NaOH→1° एमीन (1C कम)\n(2) Gabriel संश्लेषण: फ्थैलिमाइड से शुद्ध 1° एमीन\n(3) नाइट्राइल/नाइट्रो का अपचयन (H2/catalyst या LiAlH4)"},{"q":"11. विलयनों के अणुसंख्य गुणधर्मों का विस्तृत वर्णन करते हुए परासरण दाब ज्ञात करने की विधि समझाइए।","a":"अणुसंख्य गुणधर्म (विलेय कणों की संख्या पर निर्भर):\n(1) वाष्प दाब अवनमन ΔP=x2P°\n(2) क्वथनांक उन्नयन ΔTb=Kb·m\n(3) हिमांक अवनमन ΔTf=Kf·m\n(4) परासरण दाब π=CRT\nपरासरण दाब विधि: अर्धपारगम्य झिल्ली से विलयन व शुद्ध विलायक अलग, विलायक अणु झिल्ली से विलयन की ओर परासरित होते हैं — इसे रोकने हेतु लगाया गया दाब π है।\nवान्ट हॉफ: πV=nRT⇒π=CRT; वियोजन/संगुणन हेतु π=iCRT, i=प्रायोगिक π/सैद्धांतिक π।\nबड़े अणुओं (बहुलक) का आणविक भार ज्ञात करने में उपयोगी।"},{"q":"12. रासायनिक बलगतिकी – आर्रेनियस समीकरण से सक्रियण ऊर्जा ज्ञात करने की विधि एवं उत्प्रेरक की भूमिका समझाइए।","a":"आर्रेनियस: k=Ae^(-Ea/RT)\nlog k=log A-Ea/(2.303RT)\nlog k vs 1/T रेखा: ढाल=-Ea/2.303R, अंतःखंड=log A\nEa=-ढाल×2.303R\nदो ताप: log(k2/k1)=Ea/2.303R×(1/T1-1/T2)\nउत्प्रेरक की भूमिका: कम Ea वाला वैकल्पिक मार्ग देता है, जिससे अधिक अणु सक्रिय संकुल बना पाते हैं और वेग बढ़ता है; ΔH/संतुलन स्थिरांक अप्रभावित रहता है, उत्प्रेरक अंत में अपरिवर्तित रहता है।"},{"q":"13. d-ब्लॉक के तत्त्वों के इलेक्ट्रॉनिक विन्यास, ऑक्सीकरण अवस्थाएँ तथा उत्प्रेरकीय गुणों पर प्रकाश डालिए।","a":"d-ब्लॉक तत्व: 3d,4d,5d श्रेणी, विन्यास (n-1)d¹⁻¹⁰ns¹⁻²\nऑक्सीकरण अवस्थाएँ परिवर्ती (ns व (n-1)d e⁻ की भागीदारी), उच्चतम=समूह संख्या (Mn में +7), न्यूनतम स्थायी अक्सर +2\nउत्प्रेरकीय गुण:\n(1) परिवर्ती ऑक्सीकरण अवस्थाओं से इलेक्ट्रॉन स्थानांतरण सुगम\n(2) रिक्त d-कक्षकों पर अभिकारकों का अधिशोषण — Ea घटती है\nउदाहरण: Fe (हैबर-NH3), V2O5 (सम्पर्क-H2SO4), Ni (हाइड्रोजनीकरण), MnO2 (KClO3 अपघटन)"},{"q":"14. उपसहसंयोजन यौगिकों में समावयवता के प्रकारों का वर्णन करें।","a":"समावयवता के प्रकार:\n(1) संरचनात्मक:\n• आयनीकरण समावयवता: आयन व लिगैण्ड की अदला-बदली ([Co(NH3)5Br]SO4 vs [Co(NH3)5SO4]Br)\n• संयोजन समावयवता: समन्वय/आयनन क्षेत्र में लिगैण्ड वितरण भिन्न\n• बंधन समावयवता: एक लिगैण्ड दो परमाणुओं से जुड़ सके (-NO2/-ONO)\n• बहुलक समावयवता: सूत्र समान, बहुलकीकरण भिन्न\n(2) त्रिविम समावयवता:\n• ज्यामितीय (cis-trans): वर्ग समतलीय/अष्टफलकीय में लिगैण्ड व्यवस्था भिन्न\n• प्रकाशिक: दर्पण प्रतिबिम्ब अध्यारोपणीय नहीं (chiral), ध्रुवित प्रकाश घुमाते हैं"},{"q":"15. हैलोएल्केन की नाभिकस्नेही प्रतिस्थापन अभिक्रिया (SN1/SN2) की क्रियाविधि को समझाइए।","a":"SN2: एक चरण, वेग=k[RX][Nu⁻]। नाभिकस्नेही पीछे से आक्रमण, 5-संयोजी संक्रमण अवस्था, हैलाइड आगे से निकलता है — विन्यास का प्रतिलोमन (Walden inversion)। प्रवृत्ति 1°>2°>3° (भारिक रोध के कारण)।\nSN1: दो चरण — पहले C-X विदलन से कार्बोकैटायन मध्यवर्ती (मंद, वेग-निर्धारक), फिर नाभिकस्नेही शीघ्र जुड़ता है। वेग=k[RX]। प्रवृत्ति 3°>2°>1° (कार्बोकैटायन स्थायित्व)। उत्पाद में रेसिमीकरण संभव (planar कार्बोकैटायन पर दोनों ओर से आक्रमण)।"}],"BIO_S5":[{"q":"1. पुष्पी पादपों में लैंगिक जनन का विस्तृत वर्णन करते हुए निषेचन क्रियाविधि समझाइए।","a":"पुष्पी पादपों में: परागकोश में सूक्ष्मबीजुजनन से परागकण (नर गैमेटोफाइट); अंडाशय के बीजाण्ड में गुरुबीजुजनन से 8-केन्द्रकीय 7-कोशिकीय भ्रूणकोष (मादा गैमेटोफाइट)।\nपरागण: परागकणों का वर्तिकाग्र पर स्थानांतरण।\nदोहरा निषेचन: परागनलिका बीजाण्डद्वार तक पहुँचकर 2 नर गैमेट मुक्त करती है —\n• नर गैमेट1+अण्ड कोशिका→युग्मनज(2n)→भ्रूण\n• नर गैमेट2+द्वितीयक केन्द्रक→भ्रूणपोष केन्द्रक(3n)→भ्रूणपोष\nयह केवल आवृतबीजी पादपों की विशेषता है। निषेचन बाद बीजाण्ड→बीज, अंडाशय→फल।"},{"q":"2. मानव नर जनन तन्त्र की संरचना एवं कार्यों का विस्तृत वर्णन करें।","a":"वृषण (testes, जोड़ी): शुक्रजनक नलिकाओं में शुक्रजनन (अर्धसूत्री विभाजन); लेडिग कोशिकाएँ टेस्टोस्टेरोन स्रावित करती हैं।\nसहायक नलिकाएँ: अधिवृषण (शुक्राणु संग्रहण/परिपक्वन), शुक्रवाहिका।\nसहायक ग्रंथियाँ: शुक्राशय, पुरस्थ ग्रंथि, काउपर ग्रंथि — स्राव मिलकर वीर्य (पोषण+माध्यम) बनाते हैं।\nशिश्न: मैथुन अंग, वीर्य स्खलन।\nकार्य: शुक्राणु उत्पादन, टेस्टोस्टेरोन स्राव (द्वितीयक लैंगिक लक्षण), शुक्राणु स्थानांतरण।"},{"q":"3. मानव मादा जनन तन्त्र की संरचना एवं कार्यों का विस्तृत वर्णन करें।","a":"अण्डाशय (जोड़ी): अण्डजनन से अण्ड उत्पादन, एस्ट्रोजन व प्रोजेस्टेरोन स्राव; हर माह एक ग्राफियन पुटक से अण्डोत्सर्ग।\nडिम्बवाहिनी (oviduct): अण्ड को गर्भाशय तक ले जाना, इन्फंडीबुलम में निषेचन।\nगर्भाशय: भ्रूण-विकास स्थल, एण्डोमेट्रियम आर्तव चक्र अनुसार बदलता है, अपरा बनती है।\nयोनि: मैथुन/जनन मार्ग।\nस्तन ग्रंथियाँ: प्रसवोपरांत दुग्ध स्राव।\nकार्य: अण्डजनन, निषेचन-स्थल, भ्रूण-पोषण, हॉर्मोन नियमन (आर्तव चक्र 28 दिन), प्रसव-स्तनपान।"},{"q":"4. गर्भावस्था एवं प्रसव की प्रक्रिया का विस्तृत वर्णन करें।","a":"गर्भावस्था: निषेचन बाद युग्मनज विभाजित होकर ब्लास्टोसिस्ट बनता है, गर्भाशय भित्ति में रोपित (implantation) होता है। अपरा माँ-भ्रूण के बीच पोषण/गैस-विनिमय/उत्सर्जन का माध्यम, hCG/एस्ट्रोजन/प्रोजेस्टेरोन स्रावित करती है। ~9 माह (280 दिन) में 3 trimester में भ्रूण पूर्ण विकसित।\nप्रसव: भ्रूण-अपरा संकेत से गर्भाशय संकुचन (oxytocin से प्रेरित), सकारात्मक फीडबैक से तीव्र होकर labour pains बनते हैं, शिशु व अपरा निष्कासित होते हैं। प्रसव बाद प्रोलेक्टिन से दुग्ध स्राव शुरू; प्रारंभिक 'खीस' (colostrum) में IgA एण्टीबॉडी शिशु को प्रतिरक्षा देते हैं।"},{"q":"5. मेण्डल के प्रयोगों का विस्तृत वर्णन करते हुए स्वतन्त्र अपव्यूहन नियम की व्याख्या करें।","a":"एकसंकर क्रॉस: लम्बे(TT)×बौने(tt)→F1 सभी लम्बे(Tt) (प्रभाविता नियम); F1 स्वनिषेचन से F2 में 3:1 (पृथक्करण नियम — युग्मक में युग्म-विकल्पी अलग होते हैं)।\nद्विसंकर क्रॉस: RRYY×rryy→F1 RrYy(गोल-पीला); F2 में 9:3:3:1 अनुपात (9 गोल-पीला:3 गोल-हरा:3 झुर्रीदार-पीला:1 झुर्रीदार-हरा)।\nस्वतन्त्र अपव्यूहन नियम: दो/अधिक लक्षण युग्म एक साथ वंशागत होने पर प्रत्येक स्वतन्त्र रूप से पृथक/पुनर्योजित होते हैं (यदि भिन्न गुणसूत्रों पर हों) — अर्धसूत्री-I में समजात गुणसूत्रों का स्वतन्त्र पृथक्करण ही 9:3:3:1 की वजह है।"},{"q":"6. वंशागति के गुणसूत्रीय सिद्धान्त का विस्तृत वर्णन करें।","a":"वंशागति का गुणसूत्रीय सिद्धान्त (सटन-बोवेरी): जीन गुणसूत्रों पर स्थित होते हैं, गुणसूत्र-व्यवहार ही वंशागति प्रतिमान समझाता है।\nमॉर्गन का प्रयोग (Drosophila): कुछ जीन एक साथ वंशागत होते देखे (अपेक्षित स्वतन्त्र अपव्यूहन के विपरीत) क्योंकि एक ही गुणसूत्र पर निकट स्थित — सहलग्नता (linkage)।\nसहलग्नता: एक गुणसूत्र पर जीन का एक साथ वंशागत होना; निकट जीन में सहलग्नता अधिक मजबूत।\nजीन विनिमय: प्रोफेज-I में समजात गुणसूत्रों के क्रोमेटिडों में खण्ड-अदला-बदली — नए संयोजन (पुनर्योजन) बनाकर सहलग्न जीन भी अलग कर देता है, आनुवंशिक विविधता बढ़ाता है।"},{"q":"7. DNA की संरचना एवं प्रतिकृति की क्रियाविधि का विस्तृत वर्णन करें।","a":"DNA संरचना (वाटसन-क्रिक): द्विकुण्डलीय, दो पॉलीन्यूक्लियोटाइड श्रृंखला antiparallel, H-बंधों से जुड़ी। न्यूक्लियोटाइड=शर्करा(डीऑक्सीराइबोज)+फॉस्फेट+क्षारक(A,T,G,C)। क्षारक युग्मन: A=T(2H-बंध), G≡C(3H-बंध)।\nप्रतिकृति (अर्धसंरक्षी, Meselson-Stahl):\n(1) हेलिकेज से द्विकुण्डली खुलना (replication fork)\n(2) DNA पॉलीमरेज पूरक न्यूक्लियोटाइड जोड़ता है, 5'→3' दिशा में\n(3) अग्रगामी स्ट्रैंड निरंतर, पश्चगामी स्ट्रैंड Okazaki खण्डों में बनकर DNA लाइगेज से जुड़ता है\nपरिणाम: दो संतति DNA, प्रत्येक में एक मूल+एक नया स्ट्रैंड।"},{"q":"8. प्रोटीन संश्लेषण (अनुलेखन एवं अनुवादन) की प्रक्रिया का विस्तृत वर्णन करें।","a":"अनुलेखन (Transcription): DNA टेम्पलेट से RNA पॉलीमरेज द्वारा mRNA बनना (केन्द्रक में)। प्रवर्तक पर एंजाइम जुड़ता है, पूरक RNA न्यूक्लियोटाइड (U के स्थान A आधार पर) जुड़ते हैं, terminator पर रुकता है। यूकैरियोट्स में splicing/capping/tailing से परिपक्व mRNA बनता है।\nअनुवादन (Translation): राइबोसोम पर mRNA कोडॉन (3 क्षारक) को प्रोटीन में बदलना। tRNA एण्टीकोडॉन से कोडॉन पहचानकर एमीनो अम्ल लाता है। AUG(start-Met) से प्रारंभ, पेप्टाइड बंध बनते हुए श्रृंखला बढ़ती है, स्टॉप कोडॉन(UAA/UAG/UGA) पर समाप्ति।"},{"q":"9. पारिस्थितिक तन्त्र में ऊर्जा प्रवाह का विस्तृत वर्णन करें।","a":"सूर्य ऊर्जा का प्राथमिक स्रोत; उत्पादक प्रकाश-संश्लेषण से रासायनिक ऊर्जा में बदलते हैं।\nप्रवाह दिशा: एकदिशीय — उत्पादक→प्राथमिक उपभोक्ता→द्वितीयक उपभोक्ता→तृतीयक उपभोक्ता→अपघटक।\n10% नियम (लिण्डमान): प्रत्येक स्तर पर ऊर्जा का केवल ~10% अगले स्तर को, शेष 90% श्वसन/गति/ऊष्मा में नष्ट। उदा: 10000J→1000J→100J→10J\nइसी कारण खाद्य श्रृंखला 4-5 स्तर तक सीमित, ऊर्जा पिरामिड सदैव सीधा होता है (संख्या/जैवभार पिरामिड कुछ जलीय पारितंत्रों में उल्टा हो सकता है)।"},{"q":"10. जैव-प्रौद्योगिकी के सिद्धान्त एवं उपयोग का विस्तृत वर्णन करें।","a":"जैव-प्रौद्योगिकी: जीवों/उनके भागों से उत्पाद-प्रक्रिया विकास।\nसिद्धान्त:\n(1) आनुवंशिक इंजीनियरिंग: वांछित DNA को प्रतिबंधन एंजाइम से काटना→वाहक (plasmid) में DNA लाइगेज से जोड़ना→पोषी (E.coli) में प्रवेश (transformation)→क्लोनिंग/चयन\n(2) रसायन इंजीनियरिंग: बायोरिएक्टर में बड़ी मात्रा में उत्पाद हेतु प्रदूषण-मुक्त वातावरण\nउपयोग:\n• चिकित्सा: इंसुलिन, वृद्धि हॉर्मोन, टीके (Hepatitis-B)\n• कृषि: Bt कॉटन, गोल्डन राइस, रोग-प्रतिरोधी फसलें\n• पर्यावरण: बायोरेमेडिएशन\n• जीन थेरेपी: दोषपूर्ण जीन के स्थान पर सक्रिय जीन (जैसे ADA की कमी में)"},{"q":"11. दोहरे निषेचन की क्रियाविधि का वर्णन करें तथा भ्रूणकोष का नामांकित चित्र बनाइए।","a":"भ्रूणकोष (7-कोशिकीय, 8-केन्द्रकीय): अण्ड उपकरण (1 अण्ड कोशिका+2 सहायक कोशिकाएँ, बीजाण्डद्वार छोर), 3 प्रतिमुख कोशिकाएँ (विपरीत छोर), केन्द्र में द्वितीयक केन्द्रक (2 ध्रुवीय केन्द्रकों का संलयन)।\nपरागनलिका बीजाण्डद्वार से प्रवेश कर 2 नर गैमेट मुक्त करती है:\n• नर गैमेट1+अण्ड कोशिका(n)→युग्मनज(2n) — सिनगैमी → भ्रूण\n• नर गैमेट2+द्वितीयक केन्द्रक(2n)→भ्रूणपोष प्राथमिक केन्द्रक(3n) — त्रिसंलयन → भ्रूणपोष\nएक परागनलिका में दो संलयन होने से इसे दोहरा निषेचन कहते हैं — आवृतबीजी पादपों की अनूठी विशेषता। (चित्र: अण्ड उपकरण ऊपर, प्रतिमुख कोशिकाएँ नीचे, केन्द्रीय कोशिका में 2 ध्रुवीय केन्द्रक)"},{"q":"12. सहलग्नता एवं जीन विनिमय की क्रियाविधि को समझाइए।","a":"सहलग्नता: एक गुणसूत्र पर स्थित जीन स्वतन्त्र पृथक्करण न होकर समूह में वंशागत होते हैं; निकट जीन में सहलग्नता अधिक मजबूत — मॉर्गन ने Drosophila में अध्ययन किया।\nजीन विनिमय: अर्धसूत्री-I की प्रोफेज में युगली समजात गुणसूत्रों के अक्रोमेटिडों के बीच काइएज़मा बनकर खण्डों का आदान-प्रदान (एंजाइम रिकॉम्बिनेज द्वारा)।\nपरिणाम: सहलग्न जीन पुनर्योजित होकर नए संयोजन बनते हैं — आनुवंशिक विविधता का प्रमुख स्रोत व जीन मानचित्रण का आधार (विनिमय आवृत्ति ∝ जीनों के बीच दूरी)।"},{"q":"13. जीन अभिव्यक्ति का नियमन – लैक्टोज ओपेरॉन मॉडल का विस्तृत वर्णन करें।","a":"लैक ओपेरॉन (Jacob-Monod, E.coli): संरचनात्मक जीन (lacZ,lacY,lacA), प्रवर्तक, संचालक तथा नियामक जीन(lacI जो दमनकारी प्रोटीन बनाता है)।\nलैक्टोज अनुपस्थिति: दमनकारी संचालक से जुड़ा रहता है, RNA पॉलीमरेज अनुलेखन शुरू नहीं कर पाता — जीन 'बंद'।\nलैक्टोज उपस्थिति: लैक्टोज(एलोलैक्टोज) प्रेरक के रूप में दमनकारी से जुड़कर उसे संचालक से अलग करता है — RNA पॉलीमरेज अनुलेखन करता है, संरचनात्मक जीन व्यक्त होकर लैक्टोज-उपापचयी एंजाइम बनते हैं।\nयह 'प्रेरणीय (inducible) ओपेरॉन' का उदाहरण है — आवश्यकता पर ही जीन सक्रिय होते हैं, ऊर्जा बचत होती है।"},{"q":"14. मलेरिया रोग के लक्षण, रोगकारक एवं नियन्त्रण का वर्णन करें।","a":"रोगकारक: प्लाज्मोडियम (P.vivax, P.falciparum) — प्रोटोजोआ; वाहक: मादा एनोफिलीज मच्छर।\nजीवनचक्र: संक्रमित मच्छर के काटने पर स्पोरोज़ोइट रक्त में प्रवेश, यकृत में गुणन, फिर RBC में प्रवेश कर गुणन से RBC फटती हैं — हीमोज़ोइन टॉक्सिन मुक्त होता है।\nलक्षण: चक्रीय बुखार+कँपकँपी/ठण्ड (हर 3-4 दिन — RBC फटने के चक्र अनुसार), सिरदर्द, पसीना, एनीमिया, यकृत-प्लीहा वृद्धि; P.falciparum से गम्भीर (cerebral malaria)।\nनियंत्रण:\n(1) मच्छर प्रजनन स्थल (रुका पानी) नष्ट करना\n(2) मच्छरदानी/कीटनाशक\n(3) क्लोरोक्वीन/कुनैन से उपचार\n(4) समय पर रक्त-स्मीयर जाँच व उपचार"},{"q":"15. कैंसर के प्रकार, कारण एवं उपचार की विधियाँ समझाइए।","a":"कैंसर: कोशिकाओं की अनियंत्रित वृद्धि से ट्यूमर बनना।\nप्रकार:\n• सौम्य: सीमित, फैलता नहीं\n• दुर्दम: तेज़ अनियंत्रित, मेटास्टेसिस (अन्य अंगों में फैलना) करता है\nकारण (कार्सिनोजन):\n(1) भौतिक — UV/X-ray विकिरण\n(2) रासायनिक — तम्बाकू, टार\n(3) जैविक — ओंकोजेनिक वायरस (HPV)\n(4) आनुवंशिक — प्रोटो-ओंकोजीन का ओंकोजीन में उत्परिवर्तन, p53 जैसे ट्यूमर-सप्रेसर जीन की निष्क्रियता\nउपचार:\n(1) शल्य चिकित्सा — ट्यूमर निकालना\n(2) रेडियोथेरेपी — विकिरण से कोशिकाएँ नष्ट\n(3) कीमोथेरेपी — साइटोटॉक्सिक औषधि से तेज़ विभाजित कोशिकाएँ नष्ट\n(4) इम्यूनोथेरेपी — प्रतिरक्षा तंत्र को सक्रिय करना (α-इंटरफेरॉन)"}],"HIN_S5":[{"q":"1. सूरदास की भक्ति-भावना और काव्य विशेषताएँ।","a":"सूरदास (1478-1583)\nभाषा: ब्रजभाषा, रचना: सूरसागर\nविशेषताएँ:\n(1) वात्सल्य रस: कृष्ण की बाल-लीलाएँ\n(2) शृंगार: राधा-कृष्ण प्रेम\n(3) सगुण कृष्ण भक्ति\n(4) मधुर संगीत\nभक्ति: सख्य और वात्सल्य भाव\nभाषा: ब्रजभाषा का सौंदर्य, लोक-तत्त्व"},{"q":"2. प्रसाद जी के काव्य की विशेषताएँ।","a":"जयशंकर प्रसाद (1889-1937)\nरचनाएँ: कामायनी, आँसू, लहर\nविशेषताएँ:\n(1) छायावाद के प्रवर्तक\n(2) रहस्यवाद और दर्शन\n(3) प्रकृति का मानवीकरण\n(4) राष्ट्रीय चेतना\nकामायनी: 14 सर्ग, मनु-श्रद्धा\nभाषा: संस्कृतनिष्ठ, अलंकृत"},{"q":"3. महादेवी वर्मा की काव्यगत विशेषताएँ।","a":"रचनाएँ: नीहार, रश्मि, नीरजा, यामा\nविशेषताएँ:\n(1) वेदना और करुणा\n(2) रहस्यवादी भावना\n(3) प्रकृति से तादात्म्य\n(4) नारी-पीड़ा\n(5) संगीतात्मक भाषा\nपुरस्कार: ज्ञानपीठ (यामा)\n'आधुनिक मीरा' की उपाधि"},{"q":"4. हिन्दी उपन्यास के विकास का इतिहास।","a":"परीक्षागुरु (1882) — पहला उपन्यास\nप्रेमचंद युग (1900-1936):\nगोदान, सेवासदन — यथार्थवाद\nप्रेमचंदोत्तर: जैनेंद्र, अज्ञेय\nमनोवैज्ञानिक उपन्यास\nआधुनिक: रेणु — आंचलिक\nमहत्त्व: सामाजिक चेतना का दर्पण"},{"q":"5. 'स्वच्छ भारत अभियान' पर निबन्ध।","a":"प्रस्तावना: 2 अक्टूबर 2014 को शुरू\nउद्देश्य:\n(1) खुले में शौच मुक्ति\n(2) ठोस अपशिष्ट प्रबंधन\n(3) हर घर शौचालय\nउपलब्धियाँ:\n(1) 10 करोड़+ शौचालय\n(2) 600+ जिले ODF\nउपसंहार: स्वच्छता जीवनशैली बने।"},{"q":"6. 'जनसंख्या वृद्धि: समस्या और समाधान' पर निबन्ध।","a":"प्रस्तावना: भारत — 140 करोड़, विश्व में प्रथम\nकारण:\n(1) अशिक्षा\n(2) बाल विवाह\n(3) गरीबी\nप्रभाव:\n(1) बेरोजगारी\n(2) संसाधन दबाव\nसमाधान:\n(1) शिक्षा\n(2) परिवार नियोजन\n(3) महिला सशक्तीकरण"},{"q":"7. शिकायती पत्र — नगर निगम को।","a":"सेवा में,\nनगर निगम अध्यक्ष,\n[पता]\nविषय: सफाई व्यवस्था हेतु शिकायत।\nमहोदय,\nवार्ड में सफाई नहीं, कूड़े का ढेर, बीमारी का खतरा।\nनिवेदन:\n(1) नियमित सफाई\n(2) कूड़ेदान\nआपका,\n[नाम, पता, दिनांक]"},{"q":"8. सूरदास और तुलसीदास की तुलना।","a":"सूरदास: कृष्ण भक्त, वात्सल्य-शृंगार, ब्रजभाषा, सूरसागर\nतुलसीदास: राम भक्त, दास्य-समन्वयवाद, अवधी, रामचरितमानस\nसमानता: दोनों सगुण भक्त, भक्तिकाल, समाज सुधार\nअंतर: सूर=कृष्ण/वात्सल्य; तुलसी=राम/मर्यादा"},{"q":"9. छायावाद की प्रमुख विशेषताएँ।","a":"समय: 1918-1936\nविशेषताएँ:\n(1) व्यक्तिवाद\n(2) प्रकृति मानवीकरण\n(3) प्रेम और सौंदर्य\n(4) रहस्यवाद\n(5) राष्ट्रीयता\nकवि:\nप्रसाद: कामायनी\nनिराला: मुक्त छंद\nपंत: प्रकृति सौंदर्य\nमहादेवी: वेदना"},{"q":"10. हिन्दी व्याकरण — रस का विस्तृत वर्णन।","a":"'विभावानुभावव्यभिचारिसंयोगाद्रसनिष्पत्ति'\n9 रस:\nशृंगार(रति), हास्य(हास), करुण(शोक)\nरौद्र(क्रोध), वीर(उत्साह), भयानक(भय)\nबीभत्स(जुगुप्सा), अद्भुत(विस्मय), शांत(निर्वेद)\n4 अंग: स्थायी भाव, विभाव, अनुभाव, संचारी भाव\nउदा: शृंगार: 'बतरस लालच लाल की...'"}],"ENG_S5":[{"q":"1. Describe Douglas's experience in 'Deep Water' and how he overcame fear.","a":"Young Douglas thrown into YMCA pool by big boy. Nearly drowned — sinking repeatedly. Traumatized for years.\nOvercoming: Hired professional instructor. Practiced gradually — legs, arms, breathing. Tested in rivers. Conquered fear through determination.\nMessage: Fear can be overcome through courage. 'In death there is life.'"},{"q":"2. Analyse 'Lost Spring' — poverty and exploitation.","a":"Saheb: ragpicker from Bangladesh — lost spring (fields). Works at tea stall — loses freedom. Dream: play tennis.\nMukesh: bangle maker — hazardous conditions, blindness risk. Dream: mechanic.\nExploitation: child labor, debt trap, sahukars, police.\nTheme: Spring = hope lost to poverty. Must break chain of exploitation."},{"q":"3. Character sketch of rattrap peddler.","a":"Shabby, poor, philosophical — sees world as rattrap.\nMoral weakness: steals 30 kronors. Gets lost = trapped like rat!\nTransformation: Edla's kindness and dignity changes him. Returns money, signs as 'Captain von Stahle'.\nTheme: Compassion can transform even morally fallen person."},{"q":"4. Theme of 'Keeping Quiet' and relevance today.","a":"Theme: Peace through stillness.\nPoet asks: stop all activity, no language, no movement, no engines.\nResult: understanding, end to wars, harmony with nature.\nRelevance: Wars, terrorism, environmental destruction. Social media noise — we need silence and reflection.\nConclusion: Pause, reflect, find peace within."},{"q":"5. Essay: 'Importance of Education in Modern India'.","a":"Nelson Mandela: 'Education is most powerful weapon.'\nNEP 2020 — revolutionary reforms. 77% literacy.\nImportance: Development, social change, critical thinking, women empowerment.\nChallenges: Rural-urban divide, drop-out rates.\nSolutions: Digital classrooms, skill-based education.\nConclusion: Quality education for every child must be India's mission."},{"q":"6. Report on 'Science Exhibition in Your School'.","a":"ANNUAL SCIENCE EXHIBITION\nXYZ School | [Date]\nOver 200 students with 85 projects. First prize: solar water purifier (Class 12). Earthquake predictor amazed visitors. AI applications demonstrated.\nChief Guest praised creativity. Principal congratulated participants.\nConclusion: Indian students ready to lead world in science."},{"q":"7. Discuss 'Aunt Jennifer's Tigers' — plight of women.","a":"Surface: Aunt Jennifer embroiders tigers while in difficult marriage.\nTigers: bright, fearless, free — represent her desired freedom.\nAunt Jennifer: fingers fluttering, 'weight of wedding band' — oppressed.\nIrony: Tigers free; Aunt Jennifer trapped. Even after death, 'ringed with ordeals'.\nTheme: Patriarchal oppression. Women must express themselves freely."},{"q":"8. Letter to Municipal Commissioner about poor drainage.","a":"To,\nMunicipal Commissioner,\n[Address]\nSubject: Poor Drainage in [Area]\nRespected Sir,\nWater logging occurs every rainfall. Mosquitoes, impassable roads, unhygienic conditions.\nRequests: Desilting, proper drainage construction, regular maintenance.\nYours faithfully,\n[Name, Address]"},{"q":"9. Explain poetic devices in 'My Mother at Sixty-Six'.","a":"Simile: 'face ashen like corpse', 'pale as winter moon'\nImagery: 'young trees sprinting', 'merry children spilling'\nTransferred Epithet: 'familiar ache'\nRepetition: 'smile and smile and smile' — masked grief\nSymbolism: winter moon = decline; young trees = hope\nTheme: Fear of losing aging mother. Love and separation."},{"q":"10. Article: 'Role of Youth in Nation Building'.","a":"India: 65% below 35 — our greatest asset.\nContributions:\n1. Education: develop skills and values\n2. Innovation: startups, research\n3. Social responsibility: vote, volunteer\n4. Character: integrity, hard work\n5. Environment: fight climate change\nMandela: 'Education is most powerful weapon.'\nConclusion: Pledge to be responsible citizens!"}],"MAT_S5":[{"q":"1. sinx का प्रथम सिद्धान्त से अवकलज।","a":"f'(x)=lim[sin(x+h)-sinx]/h\n=lim[2cos(x+h/2)sin(h/2)]/h\n=cos(x+h/2)·[sin(h/2)/(h/2)]\nh→0: cosx·1 = cosx ✓"},{"q":"2. आव्यूह विधि से 2x+3y=5, x+2y=3 हल।","a":"A=[[2,3],[1,2]], B=[[5],[3]]\n|A|=1, A⁻¹=[[2,-3],[-1,2]]\nX=A⁻¹B=[[1],[1]]\nx=1, y=1 ✓"},{"q":"3. f(x)=x³-6x²+9x+15 के उच्चतम/निम्नतम।","a":"f'(x)=3x²-12x+9=3(x-1)(x-3)\nx=1: f''(1)=-6<0 → उच्चतम, f(1)=19\nx=3: f''(3)=6>0 → निम्नतम, f(3)=15"},{"q":"4. dy/dx+2y=e^(-x) हल।","a":"IF=e^(2x)\nd/dx[y·e^(2x)]=eˣ\ny·e^(2x)=eˣ+C\ny=e^(-x)+Ce^(-2x) ✓"},{"q":"5. बेज प्रमेय — सिद्धान्त और उदाहरण।","a":"P(Aᵢ|B)=P(Aᵢ)P(B|Aᵢ)/ΣP(Aⱼ)P(B|Aⱼ)\nI:3R,4W; II:4R,3W; P(I)=P(II)=1/2\nP(I|R)=(3/14)/(3/14+4/14)=3/7"},{"q":"6. LPP — कुर्सी और मेज समस्या।","a":"Z=100x+300y (max)\n2x+y≤40, x+3y≤45, x,y≥0\nकोने: O(0,0)=0, A(20,0)=2000\nB(15,10)=4500, C(0,15)=4500\nZ_max=₹4500"},{"q":"7. अवकलन नियम।","a":"श्रृंखला: d/dx[f(g(x))]=f'(g(x))·g'(x)\nगुणनफल: d/dx[fg]=f'g+fg'\nभागफल: d/dx[f/g]=(f'g-fg')/g²"},{"q":"8. ∫₀^(π/2) log(sinx) dx।","a":"I=∫₀^(π/2) log(sinx)dx\nगुणधर्म: I=∫₀^(π/2) log(cosx)dx\n2I=∫log(sin2x/2)dx\nI=-(π/2)log2"},{"q":"9. 3D ज्यामिति — रेखा और समतल।","a":"रेखा: →r=→a+λ→b, (x-x₁)/a=(y-y₁)/b=(z-z₁)/c\nसमतल: ax+by+cz+d=0\nकोण (रेखा-समतल): sinθ=|→b·→n|/|→b||→n|\nकोण (दो समतल): cosθ=|→n₁·→n₂|/|→n₁||→n₂|"},{"q":"10. वृत्त x²+y²=a² का क्षेत्रफल।","a":"A=4∫₀ᵃ√(a²-x²)dx\n=[x√(a²-x²)/2+a²/2·sin⁻¹(x/a)]₀ᵃ·4\n=4×πa²/4=πa² ✓"}]};

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

  try{ const v = localStorage.getItem("bseb-progress"); if(v) S.score = JSON.parse(v); }catch(e){}

  if(!S.rollNo){
    S.rollNo = "R" + Math.floor(100000+Math.random()*899999);
    try{ localStorage.setItem("bseb-rollno", S.rollNo); }catch(e){}
  }
  try{ const v = localStorage.getItem("bseb-groqkey"); if(v) S.groqKey = v; }catch(e){}

function getQs(subjectKey, mode){
  const meta = SUBJECTS[subjectKey];
  if(mode==="mix"){
    if(!S.mixOrder[subjectKey]){
      const copy = QUIZ_DATA[meta.obj].slice();
      for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]];}
      S.mixOrder[subjectKey] = copy;
    }
    return S.mixOrder[subjectKey];
  }
  return QUIZ_DATA[meta[mode]];
}

function pct(){
  const t = S.score.correct + S.score.wrong;
  return t>0 ? Math.round(S.score.correct/t*100) : 0;
}

function renderQuiz(subjectKey, mode, idx){
  const qsLen0 = getQs(subjectKey, mode).length;
  if(idx<0) idx=0;
  S.view="quiz"; S.subject=subjectKey; S.mode=mode; S.idx=idx;
  const meta = SUBJECTS[subjectKey];
  const qs = getQs(subjectKey, mode);
  if(idx>=qs.length){ return renderResult(subjectKey, mode); }
  const item = qs[idx];
  const qKey = subjectKey+"|"+mode+"|"+idx;
  const flagKey = subjectKey+"|"+mode+"|"+idx;
  const isFlagged = !!S.flagged[flagKey];
  const pct = (((idx+1)/qs.length)*100).toFixed(1);
  const navBar = `
    <div class="qnav">
      <button class="qnav-btn" data-act="prev" ${idx===0?"disabled":""}>← पिछला</button>
      <div class="qnav-progress"><div class="qnav-fill" style="width:${pct}%"></div></div>
      <button class="qnav-btn" data-act="next-free" ${idx>=qs.length-1?"disabled":""}>अगला →</button>
    </div>`;
  let body;
  if(mode==="obj" || mode==="mix"){
    const stored = S.answeredMap[qKey];
    S.answered = !!stored;
    const letters=["A","B","C","D"];
    const opts = item.opts.map((o,i)=>{
      let cls = "omr-opt";
      if(stored){
        cls += " disabled";
        if(i===stored.chosen) cls += " selected";
        if(i===item.ans) cls += " correct";
        else if(i===stored.chosen) cls += " wrong";
      }
      return `
      <div class="${cls}" data-act="${stored?'':'answer'}" data-i="${i}">
        <span class="bubble">${letters[i]}</span>
        <span class="opt-text">${esc(o)}</span>
      </div>`;
    }).join("");
    let fbHtml = "";
    if(stored){
      fbHtml = stored.chosen===item.ans
        ? `<div class="feedback good">✅ सही जवाब!</div>`
        : `<div class="feedback bad">❌ गलत। सही उत्तर: ${letters[item.ans]}) ${esc(item.opts[item.ans])}</div>`;
    }
    body = `
      <div class="qcard">
        <div class="qmeta">
          <span>${meta.name} · ${MODE_LABEL[mode]}</span>
          <span class="qmeta-right">
            <button class="flag-btn ${isFlagged?'active':''}" data-act="toggle-flag" title="Mark for review">${isFlagged?"⭐":"☆"}</button>
            Q${idx+1}/${qs.length}
          </span>
        </div>
        <div class="qtext">${esc(item.q)}</div>
        <div class="omr-list" id="omr-list">${opts}</div>
        <div id="feedback-slot">${fbHtml}</div>
      </div>
      ${navBar}
      <div id="action-slot"></div>
    `;
  } else {
    body = `
      <div class="qcard">
        <div class="qmeta">
          <span>${meta.name} · ${MODE_LABEL[mode]}</span>
          <span class="qmeta-right">
            <button class="flag-btn ${isFlagged?'active':''}" data-act="toggle-flag" title="Mark for review">${isFlagged?"⭐":"☆"}</button>
            Q${idx+1}/${qs.length}
          </span>
        </div>
        <div class="qtext">${esc(item.q)}</div>
        <div id="answer-slot"></div>
      </div>
      ${navBar}
      <div id="action-slot">
        <button class="btn btn-primary" data-act="reveal">👁 उत्तर देखें · Show Answer</button>
      </div>
    `;
  }
  render(`
    <button class="btn-back" data-act="open-subject" data-s="${subjectKey}">← विषय</button>
    ${scoreStrip(mode)}
    ${body}
  `);
  window.scrollTo(0,0);
}

function scoreStrip(mode){
  if(mode!=="obj" && mode!=="mix") return "";
  return `<div class="score-strip">
    <div class="score-pill c"><b>${S.score.correct}</b><span>सही</span></div>
    <div class="score-pill w"><b>${S.score.wrong}</b><span>गलत</span></div>
    <div class="score-pill s"><b>${S.score.skip}</b><span>स्किप</span></div>
  </div>`;
}

function celebrateCorrect(){
  if(navigator.vibrate){ try{ navigator.vibrate([35,40,35,40,70]); }catch(e){} }
  const shell = document.getElementById("shell");
  shell.classList.remove("flash-correct");
  void shell.offsetWidth; // restart animation if triggered rapidly
  shell.classList.add("flash-correct");
  setTimeout(()=>shell.classList.remove("flash-correct"), 600);

  const emojis = ["🎉","✨","🔥","💯","⭐","🥳","👏","🌟","💥","🚀","😎","🏆"];
  const burst = document.createElement("div");
  burst.className = "emoji-burst";
  const count = 14;
  for(let i=0;i<count;i++){
    const e = document.createElement("span");
    e.className = "emoji-pop";
    e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = (8 + Math.random()*84) + "vw";
    e.style.setProperty("--dx", (Math.random()*140-70) + "px");
    e.style.setProperty("--rot", (Math.random()*90-45) + "deg");
    e.style.setProperty("--dur", (0.9 + Math.random()*0.7).toFixed(2) + "s");
    e.style.animationDelay = (Math.random()*0.18).toFixed(2) + "s";
    burst.appendChild(e);
  }
  document.body.appendChild(burst);
  setTimeout(()=>burst.remove(), 2000);
}

function handleAnswer(chosenIdx){
  if(S.answered) return;
  S.answered = true;
  const qs = getQs(S.subject, S.mode);
  const item = qs[S.idx];
  const correct = item.ans;
  const qKey = S.subject+"|"+S.mode+"|"+S.idx;
  S.answeredMap[qKey] = {chosen: chosenIdx};
  const opts = document.querySelectorAll("#omr-list .omr-opt");
  opts.forEach((el,i)=>{
    el.classList.add("disabled");
    el.dataset.act = "";
    if(i===chosenIdx) el.classList.add("selected");
    if(i===correct) el.classList.add("correct");
    else if(i===chosenIdx) el.classList.add("wrong");
  });
  const letters=["A","B","C","D"];
  const fb = document.getElementById("feedback-slot");
  if(chosenIdx===correct){
    S.score.correct++;
    fb.innerHTML = `<div class="feedback good">✅ सही जवाब!</div>`;
    celebrateCorrect();
  } else {
    S.score.wrong++;
    fb.innerHTML = `<div class="feedback bad">❌ गलत। सही उत्तर: ${letters[correct]}) ${esc(item.opts[correct])}</div>`;
  }
  saveProgress();
  document.getElementById("action-slot").innerHTML =
    `<button class="btn btn-primary" data-act="next">अगला सवाल · Next →</button>`;
  // re-render header score pills
  const strip = document.querySelector(".score-strip");
  if(strip) strip.outerHTML = scoreStrip(S.mode);
  setTimeout(fbSyncScore, 300);
}

async function sendChat(){
  if(S.busy) return;
  const inp = document.getElementById("chat-input");
  const text = inp.value.trim();
  if(!text) return;
  S.chat.push({role:"user", text});
  inp.value="";
  renderChat();
  const logEl = document.getElementById("chat-log");
  logEl.insertAdjacentHTML("beforeend", `<div class="msg typing" id="typing-msg">लिख रहा हूँ...</div>`);
  window.scrollTo(0, document.body.scrollHeight);
  S.busy = true;
  try{
    const todayStr = new Date().toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    const messages = [{role:"system", content:SYS_PROMPT + " आज की तारीख़ है: " + todayStr + "। तुम्हारी जानकारी एक निश्चित समय तक की ट्रेनिंग पर आधारित है, इसलिए बहुत हाल की events पर पूरी तरह भरोसा मत दिलाना — uncertain हो तो साफ़ बता देना।"}].concat(
      S.chat.map(m=>({role: m.role==="user"?"user":"assistant", content:m.text}))
    );
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method:"POST",
      headers:{"Authorization":"Bearer "+S.groqKey, "Content-Type":"application/json"},
      body: JSON.stringify({model:"llama-3.3-70b-versatile", messages, max_tokens:1024})
    });
    const data = await res.json();
    if(data.error){ throw new Error(data.error.message || "Unknown error"); }
    const answer = (data.choices && data.choices[0] && data.choices[0].message.content) || "माफ़ करना, जवाब नहीं मिल पाया।";
    S.chat.push({role:"assistant", text:answer.trim()});
  }catch(e){
    S.chat.push({role:"assistant", text:"⚠️ Error: "+e.message+"\n\nअपनी API key console.groq.com पर जाकर जाँच लो।"});
  }
  S.busy = false;
  renderChat();
}

  }, {passive:true});
  shellEl.addEventListener("touchend", function(e){
    if(S.view!=="quiz" || touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    touchStartX = null;
    if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) renderQuiz(S.subject, S.mode, S.idx+1);
      else renderQuiz(S.subject, S.mode, S.idx-1);
    }
  }, {passive:true});
})();

// ── Firebase helpers (global, uses window._fb* set by module) ──
function fbReady(){ return !!window._fbReady && !!window._fbDB; }

function fbSyncScore(){
  if(!fbReady()) return;
  const c=S.score.correct, w=S.score.wrong, sk=S.score.skip||0;
  const total=c+w;
  // Only sync if user has actually attempted at least 1 question
  if(total+sk===0) return;
  try{
    const acc = total>0 ? Math.round(c/total*100) : 0;
    const displayName = S.displayName || S.rollNo;
    window._fbRef("users/"+S.rollNo).set({
      name: displayName, rollNo: S.rollNo,
      correct:c, wrong:w, skip:sk, acc, total,
      attempted: total+sk,
      lastActive: Date.now()
    });
  } catch(e){ console.warn("[FB] sync failed", e); }
}

function fbMarkActive(){
  if(!fbReady()) return;
  try{
    window._fbRef("active/"+S.rollNo).set({ ts: Date.now() });
  } catch(e){}
}

async function fbGetLeaderboard(){
  if(!fbReady()) return null;
  try{
    const snap = await window._fbRef("users").once("value");
    if(!snap.exists()) return [];
    const all=[];
    snap.forEach(c=>{ all.push(c.val()); });
    all.sort((a,b)=>b.correct-a.correct || b.acc-a.acc);
    return all;
  } catch(e){ console.warn("[FB] lb error",e); return null; }
}

async function fbGetActiveCount(){
  if(!fbReady()) return null;
  try{
    const now=Date.now();
    const snap = await window._fbRef("active").once("value");
    if(!snap.exists()) return 0;
    let n=0;
    snap.forEach(c=>{ if((now-c.val().ts)<300000) n++; });
    return n;
  } catch(e){ return null; }
}
