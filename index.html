// ── Load/Save ──
async function loadStorage(){
  try{ const v = localStorage.getItem("bseb-progress"); if(v) S.score = JSON.parse(v); }catch(e){}
  try{ const v = localStorage.getItem("bseb-rollno"); if(v) S.rollNo = v; }catch(e){}
  if(!S.rollNo){ S.rollNo = "R" + Math.floor(100000+Math.random()*899999); try{ localStorage.setItem("bseb-rollno", S.rollNo); }catch(e){} }
  S.groqKey = GROQ_API_KEY;
  try{ const v = localStorage.getItem("bseb-groqkey"); if(v) S.groqKey = v; }catch(e){}

  // Daily challenge
  try{ const d = localStorage.getItem("daily"); if(d) S.daily = JSON.parse(d); }catch(e){}
  // Streak
  checkDailyStreak();
}
function saveProgress(){ try{ localStorage.setItem("bseb-progress", JSON.stringify(S.score)); }catch(e){} }
function saveDaily(){ try{ localStorage.setItem("daily", JSON.stringify(S.daily)); }catch(e){} }
function pct(){ const t = S.score.correct + S.score.wrong; return t>0 ? Math.round(S.score.correct/t*100) : 0; }

// ── Daily Challenge Streak ──
function checkDailyStreak(){
  const today = new Date().toISOString().split('T')[0];
  const last = S.daily.lastDate || '';
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (last === yesterday) {
    S.daily.streak = (S.daily.streak || 0) + 1;
  } else {
    S.daily.streak = 0;
  }
  S.daily.lastDate = today;
  S.daily.completed = false;
  S.daily.answers = {};
  saveDaily();
}

// ── Generate Daily Questions ──
function generateDailyQuestions(){
  // Pick 10 random from all subjects
  const all = [];
  Object.keys(QUIZ_DATA).forEach(key => {
    if (key.endsWith('_OBJ')) {
      all.push(...QUIZ_DATA[key]);
    }
  });
  const shuffled = [...all];
  for (let i = shuffled.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, 10);
}

// ── NEW FEATURE 1: BATTLE MODE ──
function renderBattle(){
  S.view="battle";
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-battle").classList.add("active");
  if (!S.battle.active) {
    // Show setup screen
    render(`
      ${admitHeader("⚔️ Battle Mode","2 Players · Same Device")}
      <div class="section-label">Player Names</div>
      <input id="p1-name" placeholder="Player 1 Name" value="Player 1" style="width:100%;background:var(--paper-2);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:8px;outline:none;">
      <input id="p2-name" placeholder="Player 2 Name" value="Player 2" style="width:100%;background:var(--paper-2);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;">
      <button class="btn btn-primary" onclick="startBattle()">⚔️ Start Battle</button>
      <button class="btn btn-ghost" data-act="go-home">🏠 Home</button>
    `);
    return;
  }
  // Battle ongoing
  const b = S.battle;
  const qs = b.questions || [];
  const idx = b.currentQ;
  const total = qs.length;
  if (idx >= total) {
    // Battle over
    const winner = b.scores[0] > b.scores[1] ? b.players[0] : (b.scores[1] > b.scores[0] ? b.players[1] : "Draw");
    render(`
      <div class="result-wrap">
        <div style="font-size:60px;">${b.scores[0] > b.scores[1] ? '🏆' : (b.scores[1] > b.scores[0] ? '🏆' : '🤝')}</div>
        <div class="result-pct">Battle Over!</div>
        <div class="result-line">Winner: <b>${esc(winner)}</b></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:15px 0;">
          <div class="score-pill"><b>${b.scores[0]}</b><span>${esc(b.players[0])}</span></div>
          <div class="score-pill"><b>${b.scores[1]}</b><span>${esc(b.players[1])}</span></div>
        </div>
        <button class="btn btn-primary" onclick="resetBattle()">🔄 Rematch</button>
        <button class="btn btn-ghost" onclick="resetBattle();renderHome();">🏠 Home</button>
      </div>
    `);
    return;
  }
  const q = qs[idx];
  const letters = ["A","B","C","D"];
  const optsHtml = q.opts ? q.opts.map((o,i)=>{
    const disabled = b.answered[0] && b.answered[1] ? 'disabled' : '';
    const cls = `omr-opt ${disabled}`;
    return `<div class="${cls}" data-act="${disabled ? '' : 'battle-answer'}" data-p="${0}" data-i="${i}"><span class="bubble">${letters[i]}</span><span class="opt-text">${esc(o)}</span></div>`;
  }).join('') : '';
  const timerHtml = `<div style="text-align:center;font-size:24px;font-family:'JetBrains Mono',monospace;color:var(--lamp);">⏱️ ${b.timer}s</div>`;
  render(`
    ${admitHeader("⚔️ Battle","Q"+(idx+1)+"/"+total)}
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <div style="flex:1;background:rgba(127,170,130,0.15);border-radius:8px;padding:8px;text-align:center;">
        <div style="font-weight:700;">${esc(b.players[0])}</div>
        <div style="font-size:24px;font-weight:800;color:var(--good);" id="bscore0">${b.scores[0]}</div>
      </div>
      <div style="flex:1;background:rgba(227,168,63,0.15);border-radius:8px;padding:8px;text-align:center;">
        <div style="font-weight:700;">${esc(b.players[1])}</div>
        <div style="font-size:24px;font-weight:800;color:var(--lamp);" id="bscore1">${b.scores[1]}</div>
      </div>
    </div>
    ${timerHtml}
    <div class="qcard">
      <div class="qtext">${esc(q.q)}</div>
      <div class="omr-list">${optsHtml}</div>
      <div id="battle-feedback" style="margin-top:10px;"></div>
    </div>
    <button class="btn btn-ghost" onclick="resetBattle();renderHome();">🚪 Exit Battle</button>
  `);
  window.scrollTo(0,0);
  // Start timer if not started
  if (!b.interval) {
    b.timer = 10;
    b.interval = setInterval(() => {
      b.timer--;
      const timerEl = document.querySelector('.qcard .qtext')?.parentElement?.querySelector('[style*="font-size:24px"]');
      if (timerEl) timerEl.textContent = `⏱️ ${b.timer}s`;
      if (b.timer <= 0) {
        clearInterval(b.interval);
        b.interval = null;
        // Auto advance if both answered already
        if (b.answered[0] && b.answered[1]) {
          battleNext();
        } else {
          showToast("⏰ Time's up! Moving to next.", "warning");
          battleNext();
        }
      }
    }, 1000);
  }
}

// Start Battle
function startBattle(){
  const p1 = document.getElementById("p1-name").value.trim() || "Player 1";
  const p2 = document.getElementById("p2-name").value.trim() || "Player 2";
  // Get 10 random objective questions
  const all = [];
  Object.keys(QUIZ_DATA).forEach(key => {
    if (key.endsWith('_OBJ')) all.push(...QUIZ_DATA[key]);
  });
  const shuffled = [...all];
  for (let i = shuffled.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const questions = shuffled.slice(0, 10);
  S.battle = {
    active: true,
    players: [p1, p2],
    questions: questions,
    currentQ: 0,
    scores: [0, 0],
    answered: [false, false],
    timer: 10,
    interval: null
  };
  renderBattle();
}

// Battle Answer
window.battleAnswer = function(playerIdx, qIdx, chosen){
  if (S.battle.answered[playerIdx]) return;
  const q = S.battle.questions[qIdx];
  const correct = q.ans;
  if (chosen === correct) {
    S.battle.scores[playerIdx] += 10;
    document.getElementById('bscore'+playerIdx).textContent = S.battle.scores[playerIdx];
    showToast(`✅ ${S.battle.players[playerIdx]} got it right!`, "success");
  } else {
    showToast(`❌ ${S.battle.players[playerIdx]} wrong!`, "danger");
  }
  S.battle.answered[playerIdx] = true;
  // Check if both answered
  if (S.battle.answered[0] && S.battle.answered[1]) {
    clearInterval(S.battle.interval);
    S.battle.interval = null;
    setTimeout(battleNext, 1000);
  }
};

function battleNext(){
  S.battle.currentQ++;
  S.battle.answered = [false, false];
  S.battle.timer = 10;
  if (S.battle.currentQ >= S.battle.questions.length) {
    clearInterval(S.battle.interval);
    S.battle.interval = null;
    renderBattle();
    return;
  }
  renderBattle();
}

function resetBattle(){
  if (S.battle.interval) clearInterval(S.battle.interval);
  S.battle.active = false;
  S.battle.interval = null;
  S.battle.questions = [];
  S.battle.currentQ = 0;
  S.battle.scores = [0,0];
  S.battle.answered = [false,false];
  S.battle.timer = 10;
}

// ── NEW FEATURE 2: DAILY CHALLENGE ──
function renderDaily(){
  S.view="daily";
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-daily").classList.add("active");
  checkDailyStreak();
  const today = new Date().toISOString().split('T')[0];
  const completed = S.daily.completed;
  const streak = S.daily.streak || 0;
  let questions = S.daily.questions;
  if (!questions || questions.length === 0) {
    questions = generateDailyQuestions();
    S.daily.questions = questions;
    S.daily.answers = {};
    saveDaily();
  }
  const total = questions.length;
  const answered = Object.keys(S.daily.answers).length;
  const progress = total>0 ? Math.round(answered/total*100) : 0;

  let qHtml = '';
  if (!completed) {
    // Show questions
    questions.forEach((q, i) => {
      const ans = S.daily.answers[i];
      const letters = ["A","B","C","D"];
      const opts = q.opts.map((o, j) => {
        const selected = ans === j ? 'selected' : '';
        const disabled = ans !== undefined ? 'disabled' : '';
        return `<div class="omr-opt ${selected} ${disabled}" onclick="${ans===undefined ? `dailyAnswer(${i},${j})` : ''}"><span class="bubble">${letters[j]}</span><span class="opt-text">${esc(o)}</span></div>`;
      }).join('');
      const feedback = ans !== undefined ? (ans === q.ans ? '<div class="feedback good">✅ Correct</div>' : '<div class="feedback bad">❌ Wrong</div>') : '';
      qHtml += `
        <div class="qcard">
          <div class="qmeta"><span>Q${i+1}/${total}</span></div>
          <div class="qtext">${esc(q.q)}</div>
          <div class="omr-list">${opts}</div>
          ${feedback}
        </div>
      `;
    });
  } else {
    qHtml = `<div class="result-wrap"><div class="result-pct">🎉</div><div class="result-line">Today's challenge complete!</div><div style="font-size:14px;color:var(--text-dim);">Streak: ${streak} days 🔥</div></div>`;
  }

  render(`
    ${admitHeader("📅 Daily Challenge", "10 Questions · New Daily")}
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      <div class="score-pill"><b>${streak}</b><span>🔥 Streak</span></div>
      <div class="score-pill"><b>${answered}/${total}</b><span>Answered</span></div>
      <div class="score-pill"><b>${progress}%</b><span>Progress</span></div>
    </div>
    ${qHtml}
    ${!completed && answered === total ? `<button class="btn btn-primary" onclick="completeDaily()">✅ Submit & Claim Streak</button>` : ''}
    <button class="btn btn-ghost" data-act="go-home">🏠 Home</button>
  `);
  window.scrollTo(0,0);
}

window.dailyAnswer = function(index, choice){
  if (S.daily.completed) return;
  const q = S.daily.questions[index];
  if (!q) return;
  S.daily.answers[index] = choice;
  saveDaily();
  renderDaily();
};

window.completeDaily = function(){
  S.daily.completed = true;
  S.daily.streak = (S.daily.streak || 0) + 1;
  saveDaily();
  showToast(`🔥 Streak: ${S.daily.streak} days!`, "success");
  renderDaily();
};

async function loadTeacherData(){
  if (!window._fbReady) {
    document.getElementById("teacher-data").innerHTML = "⚠️ Firebase not connected.";
    return;
  }
  try {
    const usersSnap = await window._fbRef("users").once("value");
    const users = [];
    if (usersSnap.exists()) usersSnap.forEach(c=>users.push(c.val()));
    const activeUsers = users.filter(u=>u.attempted>0);
    const total = activeUsers.length;
    const avg = total>0 ? Math.round(activeUsers.reduce((s,u)=>s+(u.acc||0),0)/total) : 0;
    const tests = activeUsers.reduce((s,u)=>s+(u.attempted||0),0);
    document.getElementById("t-total").textContent = total;
    document.getElementById("t-avg").textContent = avg + '%';
    document.getElementById("t-tests").textContent = tests;
    // Active count
    try {
      const aSnap = await window._fbRef("active").once("value");
      let act=0; if(aSnap.exists()){ const now=Date.now(); aSnap.forEach(c=>{ if((now-c.val().ts)<300000) act++; }); }
      document.getElementById("t-active").textContent = act;
    } catch(e){}
    // List top students
    const sorted = activeUsers.sort((a,b)=>b.correct-a.correct || b.acc-a.acc).slice(0,10);
    let html = `<div style="font-weight:700;margin-bottom:6px;">🏅 Top 10 Students</div>`;
    sorted.forEach((u,i)=>{
      html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--rule);font-size:13px;">
        <span>${i+1}. ${esc(u.name||u.rollNo)}</span>
        <span>✅${u.correct} ❌${u.wrong} (${u.acc||0}%)</span>
      </div>`;
    });
    document.getElementById("teacher-data").innerHTML = html || "No data";
  } catch(e) {
    document.getElementById("teacher-data").innerHTML = "⚠️ Error loading data.";
  }
}

function teacherLogin(){

}

// Download certificate as PNG
function downloadCertificate(){
  const certEl = document.getElementById('certificate');
  if (!certEl) { showToast("Certificate not found.", "warning"); return; }
  // Use html2canvas if available, else fallback to print
  if (typeof html2canvas !== 'undefined') {
    html2canvas(certEl, {scale:2, backgroundColor:null, useCORS:true}).then(canvas => {
      const link = document.createElement('a');
      link.download = `Certificate-${S.rollNo}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).catch(() => {
      window.print();
    });
  } else {
    // Load html2canvas dynamically
    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    script.onload = function(){ downloadCertificate(); };
    document.head.appendChild(script);
  }
}

  let touchStartX=null, touchStartY=null;
  document.getElementById("shell").addEventListener("touchstart", function(e){
    if(S.view!=="quiz" || e.touches.length!==1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  document.getElementById("shell").addEventListener("touchend", function(e){
    if(S.view!=="quiz" || touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    touchStartX = null;
    if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) renderQuiz(S.subject, S.mode, S.idx+1);
      else renderQuiz(S.subject, S.mode, S.idx-1);
    }
  }, {passive:true});
})();

window.showToast = function(message, type = 'info') {

  toast.style.cssText = `
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--paper-2); color: #fff; padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500; border: 1px solid ${colors[type] || 'var(--rule)'};
    box-shadow: 0 8px 30px rgba(0,0,0,0.6); z-index: 99999; max-width: 90%; text-align: center;
    animation: riseIn 0.3s ease;
  `;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s ease'; setTimeout(() => toast.remove(), 400); }, 4000);
};
